<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>交差点 — 探索・交流 | SchoolPark</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0f14;--surface:#12161e;--card:#181e28;--border:#1e2a38;
  --accent:#3b82f6;--accent2:#60a5fa;--gold:#fbbf24;
  --text:#d8e4f0;--muted:#5a7080;--radius:12px;
}
body{background:var(--bg);color:var(--text);font-family:'Zen Maru Gothic',sans-serif;min-height:100vh;overflow-x:hidden}

/* Header */
.hdr{position:sticky;top:0;z-index:100;background:rgba(13,15,20,0.95);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);padding:0 14px;display:flex;align-items:center;gap:10px;height:52px}
.hdr-title{font-size:0.92rem;font-weight:700;flex:1}
.hdr-sub{font-size:0.68rem;color:var(--muted)}
.close-btn{background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.3);color:var(--accent2);
  padding:5px 14px;border-radius:20px;cursor:pointer;font-size:0.78rem;font-family:inherit;white-space:nowrap}
.close-btn:hover{background:rgba(59,130,246,.28)}

/* 交差点ビジュアル */
.crossing-hero{position:relative;height:200px;background:#090c12;overflow:hidden;border-bottom:1px solid var(--border)}
.road-h,.road-v{position:absolute;background:#141a24}
.road-h{left:0;right:0;top:50%;transform:translateY(-50%);height:60px}
.road-v{top:0;bottom:0;left:50%;transform:translateX(-50%);width:60px}
.cw{position:absolute;display:flex;gap:4px}
.cw-h{left:calc(50% - 30px);width:60px;top:calc(50% - 42px);flex-direction:column}
.cw-v{top:calc(50% - 30px);height:60px;left:calc(50% - 42px);flex-direction:row}
.cw-stripe{background:rgba(255,255,255,.1);flex-shrink:0}
.cw-h .cw-stripe{width:100%;height:7px}
.cw-v .cw-stripe{height:100%;width:7px}
.signal{position:absolute;background:#0a0f1a;border:1px solid #1e2a3a;border-radius:6px;width:18px;
  display:flex;flex-direction:column;align-items:center;padding:3px 2px;gap:2px}
.sig-tl{top:calc(50% - 58px);left:calc(50% - 52px)}
.sig-tr{top:calc(50% - 58px);right:calc(50% - 52px)}
.sig-bl{bottom:calc(50% - 58px);left:calc(50% - 52px)}
.sig-br{bottom:calc(50% - 58px);right:calc(50% - 52px)}
.bulb{width:11px;height:11px;border-radius:50%;background:#1a1a1a;transition:all .3s}
.on-r{background:#f44;box-shadow:0 0 8px #f44}
.on-y{background:#ffd700;box-shadow:0 0 8px #ffd700}
.on-g{background:#0e6;box-shadow:0 0 8px #0e6}
.hero-label{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
  background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.3);
  border-radius:20px;padding:4px 14px;font-size:0.7rem;color:var(--accent2);white-space:nowrap}

/* Tabs */
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:10px 16px;font-size:0.74rem;font-weight:700;
  color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;font-family:inherit}
.tab.active{color:var(--accent2);border-color:var(--accent)}

/* Main */
.main{padding:14px;max-width:640px;margin:0 auto}
.panel{display:none}
.panel.active{display:block}

/* Post card */
.post-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color .15s}
.post-card:hover{border-color:rgba(59,130,246,.4)}
.post-card-title{font-size:0.85rem;font-weight:700;margin-bottom:5px;line-height:1.4}
.post-card-body{font-size:0.76rem;color:var(--muted);line-height:1.6;margin-bottom:8px;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.post-card-meta{display:flex;gap:10px;font-size:0.68rem;color:var(--muted);align-items:center;flex-wrap:wrap}
.post-card-tag{background:rgba(59,130,246,.12);color:var(--accent2);border:1px solid rgba(59,130,246,.2);
  padding:1px 7px;border-radius:10px;font-size:0.66rem}
.badge-row{display:flex;gap:4px;align-items:center;margin-top:4px;flex-wrap:wrap}

/* Post viewer modal */
.pv-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;
  align-items:center;justify-content:center;padding:14px}
.pv-backdrop.open{display:flex}
.pv-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;
  width:100%;max-width:520px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden}
.pv-hdr{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:center}
.pv-close{background:none;border:none;color:var(--muted);font-size:1.1rem;cursor:pointer;margin-left:auto;padding:2px}
.pv-body{flex:1;overflow-y:auto;padding:16px}
.pv-title{font-size:1rem;font-weight:700;margin-bottom:10px;line-height:1.4}
.pv-text{font-size:0.82rem;line-height:1.75;white-space:pre-wrap;color:#bdd0e0}
.pv-img{max-width:100%;border-radius:8px;margin:10px 0;display:block}
.pv-actions{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px}
.pv-btn{flex:1;padding:9px;border-radius:8px;border:1px solid var(--border);background:var(--card);
  color:var(--text);font-size:0.78rem;font-family:inherit;cursor:pointer;transition:background .15s}
.pv-btn:hover{background:rgba(255,255,255,.07)}
.pv-btn.active{background:rgba(59,130,246,.2);border-color:rgba(59,130,246,.5);color:var(--accent2)}

/* Chat */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 310px);min-height:300px}
.chat-msgs{flex:1;overflow-y:auto;padding:0 0 8px;display:flex;flex-direction:column;gap:8px}
.chat-msg{display:flex;gap:8px;align-items:flex-start}
.chat-msg.me{flex-direction:row-reverse}
.chat-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:0.8rem;font-weight:700;color:#fff;flex-shrink:0}
.chat-bubble{background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:7px 11px;font-size:0.78rem;line-height:1.5;max-width:78%;word-break:break-word}
.chat-msg.me .chat-bubble{background:rgba(59,130,246,.18);border-color:rgba(59,130,246,.35)}
.chat-name{font-size:0.66rem;color:var(--muted);margin-bottom:2px;display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.chat-form{display:flex;gap:6px;padding-top:8px;border-top:1px solid var(--border)}
.chat-input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;
  color:var(--text);padding:8px 12px;font-size:0.8rem;font-family:inherit;resize:none;outline:none}
.chat-input:focus{border-color:rgba(59,130,246,.5)}
.chat-send{background:var(--accent);border:none;color:#fff;padding:8px 14px;border-radius:8px;
  font-family:inherit;font-size:0.78rem;cursor:pointer;white-space:nowrap}

/* Loading / empty */
.loading{text-align:center;padding:30px;color:var(--muted);font-size:0.8rem}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-title">🔀 交差点 — 探索・交流</div>
    <div class="hdr-sub">Emuの投稿を探索し、交流する場所</div>
  </div>
  <button class="close-btn" onclick="window.top.postMessage({type:'spContentClose'},'*')">✕ 閉じる</button>
</div>

<!-- 交差点ビジュアル -->
<div class="crossing-hero">
  <div class="road-h"></div>
  <div class="road-v"></div>
  <div class="cw cw-h">${Array(6).fill('<div class="cw-stripe"></div>').join('')}</div>
  <div class="cw cw-v">${Array(6).fill('<div class="cw-stripe"></div>').join('')}</div>
  <div class="signal sig-tl"><div class="bulb on-r" id="s1r"></div><div class="bulb" id="s1y"></div><div class="bulb" id="s1g"></div></div>
  <div class="signal sig-tr"><div class="bulb on-r" id="s2r"></div><div class="bulb" id="s2y"></div><div class="bulb" id="s2g"></div></div>
  <div class="signal sig-bl"><div class="bulb" id="s3r"></div><div class="bulb" id="s3y"></div><div class="bulb on-g" id="s3g"></div></div>
  <div class="signal sig-br"><div class="bulb" id="s4r"></div><div class="bulb" id="s4y"></div><div class="bulb on-g" id="s4g"></div></div>
  <div class="hero-label">🔀 交差点 — 探索・交流ハブ</div>
</div>

<div class="tabs">
  <button class="tab active" onclick="scTab('explore',this)">🔍 探索</button>
  <button class="tab" onclick="scTab('kouryu',this)">🤝 交流</button>
  <button class="tab" onclick="scTab('new',this)">🆕 新着</button>
  <button class="tab" onclick="scTab('chat',this)">💬 チャット</button>
</div>

<div class="main">
  <div class="panel active" id="sc-panel-explore">
    <div id="scExploreList"><div class="loading">🔍 読み込み中…</div></div>
  </div>
  <div class="panel" id="sc-panel-kouryu">
    <div id="scKouryuList"><div class="loading">🤝 読み込み中…</div></div>
  </div>
  <div class="panel" id="sc-panel-new">
    <div id="scNewList"><div class="loading">🆕 読み込み中…</div></div>
  </div>
  <div class="panel" id="sc-panel-chat">
    <div class="chat-wrap">
      <div class="chat-msgs" id="scChatMsgs"><div class="loading">💬 接続中…</div></div>
      <div class="chat-form">
        <textarea class="chat-input" id="scChatInput" rows="1" placeholder="メッセージを入力… (Enterで送信)"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();scSendChat();}"></textarea>
        <button class="chat-send" onclick="scSendChat()">送信</button>
      </div>
    </div>
  </div>
</div>

<!-- 投稿ビューアモーダル -->
<div class="pv-backdrop" id="scPvBackdrop" onclick="if(event.target===this)scClosePv()">
  <div class="pv-box">
    <div class="pv-hdr">
      <div style="font-size:0.72rem;color:var(--muted)">📝 投稿詳細</div>
      <button class="pv-close" onclick="scClosePv()">✕</button>
    </div>
    <div class="pv-body" id="scPvBody"></div>
    <div class="pv-actions" id="scPvActions"></div>
  </div>
</div>

<script>
// ── Firestore ──
let scDB = null, scLib = null, scWallet = '';

function scInitFirestore() {
  try {
    scDB     = window.top.db     || window.top.fpDB;
    scLib    = window.top.fbLib  || window.top.fpFBLib;
    scWallet = (new URLSearchParams(location.search)).get('wallet') || '';
  } catch(e) {}
  if (scDB && scLib) {
    scLoadPosts('探索', 'scExploreList');
    scLoadPosts('交流', 'scKouryuList');
    scLoadNew();
    scInitChat();
  } else {
    setTimeout(scInitFirestore, 600);
  }
}

async function scLoadPosts(tag, listId) {
  const list = document.getElementById(listId);
  if (!list) return;
  try {
    const q = scLib.query(
      scLib.collection(scDB, 'posts'),
      scLib.where('tags', 'array-contains', tag),
      scLib.orderBy('goodCount', 'desc'),
      scLib.limit(20)
    );
    const snap = await scLib.getDocs(q);
    if (snap.empty) { list.innerHTML = `<div class="loading">📭 「${tag}」タグの投稿がありません</div>`; return; }
    list.innerHTML = snap.docs.map(d => scBuildCard(d.id, d.data(), tag)).join('');
  } catch(e) { list.innerHTML = `<div class="loading">⚠️ 読み込みエラー: ${e.message}</div>`; }
}

async function scLoadNew() {
  const list = document.getElementById('scNewList');
  if (!list) return;
  try {
    const q = scLib.query(
      scLib.collection(scDB, 'posts'),
      scLib.orderBy('createdAt', 'desc'),
      scLib.limit(20)
    );
    const snap = await scLib.getDocs(q);
    if (snap.empty) { list.innerHTML = '<div class="loading">📭 投稿がありません</div>'; return; }
    list.innerHTML = snap.docs.map(d => scBuildCard(d.id, d.data(), '')).join('');
  } catch(e) { list.innerHTML = `<div class="loading">⚠️ 読み込みエラー</div>`; }
}

function scBuildCard(id, p, highlightTag) {
  const title = esc(p.title || '（無題）');
  const body  = esc(p.body  || '').slice(0, 100);
  const good  = p.goodCount  || 0;
  const change= p.changeCount|| 0;
  const tags  = (typeof p.tags === 'string' ? p.tags.split(',') : (p.tags||[])).filter(Boolean);
  const tagHtml = tags.map(t => `<span class="post-card-tag">#${esc(t.trim())}</span>`).join('');
  return `<div class="post-card" onclick="scOpenPost('${id}')">
    <div class="post-card-title">${title}</div>
    <div class="post-card-body">${body}${body.length>=100?'…':''}</div>
    <div class="post-card-meta">
      <span>👍 ${good}</span><span>🤝 ${change}</span>
      <div style="display:flex;gap:4px;flex-wrap:wrap">${tagHtml}</div>
    </div>
  </div>`;
}

// ── 投稿ビューア ──
let _openPostId = null;
async function scOpenPost(id) {
  _openPostId = id;
  const body = document.getElementById('scPvBody');
  const acts = document.getElementById('scPvActions');
  body.innerHTML = '<div class="loading">読み込み中…</div>';
  document.getElementById('scPvBackdrop').classList.add('open');
  try {
    const snap = await scLib.getDoc(scLib.doc(scDB, 'posts', id));
    if (!snap.exists()) { body.innerHTML = '<div class="loading">投稿が見つかりません</div>'; return; }
    const p = snap.data();
    const tags = (typeof p.tags === 'string' ? p.tags.split(',') : (p.tags||[])).filter(Boolean);
    body.innerHTML = `
      <div class="pv-title">${esc(p.title||'')}</div>
      ${p.imageUrl ? `<img src="${esc(p.imageUrl)}" class="pv-img">` : ''}
      <div class="pv-text">${esc(p.body||'')}</div>
      <div style="margin-top:12px;display:flex;gap:5px;flex-wrap:wrap">
        ${tags.map(t=>`<span class="post-card-tag">#${esc(t.trim())}</span>`).join('')}
      </div>`;
    acts.innerHTML = `
      <button class="pv-btn" onclick="scGood('${id}')">👍 いいね (${p.goodCount||0})</button>
      <button class="pv-btn" onclick="scChange('${id}')">🤝 change (${p.changeCount||0})</button>`;
  } catch(e) { body.innerHTML = `<div class="loading">⚠️ ${e.message}</div>`; }
}
function scClosePv() { document.getElementById('scPvBackdrop').classList.remove('open'); }

async function scGood(id) {
  if (!scWallet) { alert('ウォレット接続が必要です'); return; }
  try {
    const ref = scLib.doc(scDB, 'posts', id);
    await scLib.updateDoc(ref, { goodCount: scLib.increment(1) });
    scOpenPost(id);
  } catch(e) {}
}
async function scChange(id) {
  if (!scWallet) { alert('ウォレット接続が必要です'); return; }
  try {
    const ref = scLib.doc(scDB, 'posts', id);
    await scLib.updateDoc(ref, { changeCount: scLib.increment(1) });
    scOpenPost(id);
  } catch(e) {}
}

// ── タブ切り替え ──
function scTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`sc-panel-${name}`).classList.add('active');
}

// ── チャット (Socket.io) ──
let scSocket = null;
const SC_SOCKET_URL = (() => {
  try { return window.top.location.hostname === 'localhost' ? 'http://localhost:3000' : 'https://emu-realtime.onrender.com'; } catch(e) { return 'https://emu-realtime.onrender.com'; }
})();

function scInitChat() {
  const msgs = document.getElementById('scChatMsgs');
  if (typeof io === 'undefined') { msgs.innerHTML = '<div class="loading">⚠️ Socket.io が読み込まれていません</div>'; return; }
  scSocket = io(SC_SOCKET_URL, { transports:['websocket','polling'] });
  const myName = (() => { try { return window.top.document.getElementById('displayNameInput')?.value || '名無し'; } catch(e) { return '名無し'; } })();

  scSocket.on('connect', () => {
    scSocket.emit('join crossing', { wallet: scWallet, name: myName });
    msgs.innerHTML = '';
  });
  scSocket.on('connect_error', () => {
    msgs.innerHTML = '<div class="loading">⚠️ チャット接続に失敗しました</div>';
  });
  scSocket.on('crossing history', history => {
    msgs.innerHTML = '';
    history.forEach(m => scAppendMsg(m, m.wallet === scWallet));
    msgs.scrollTop = msgs.scrollHeight;
  });
  scSocket.on('crossing message', m => {
    scAppendMsg(m, m.wallet === scWallet);
    msgs.scrollTop = msgs.scrollHeight;
  });
}

function scAppendMsg(m, isMe) {
  const msgs = document.getElementById('scChatMsgs');
  const div  = document.createElement('div');
  div.className = 'chat-msg' + (isMe ? ' me' : '');
  const initials = (m.name||'名').charAt(0).toUpperCase();
  const dt = m.timestamp ? new Date(m.timestamp).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}) : '';
  const colors = ['linear-gradient(135deg,#3b82f6,#6366f1)','linear-gradient(135deg,#10b981,#34d399)',
                  'linear-gradient(135deg,#0ea5e9,#38bdf8)','linear-gradient(135deg,#ec4899,#f43f5e)'];
  const ci = (m.wallet||'').charCodeAt(2) % colors.length;
  div.innerHTML = `
    <div class="chat-av" style="background:${colors[ci]}">${initials}</div>
    <div style="min-width:0">
      <div class="chat-name">
        <span>${esc(m.name||'名無し')}</span>
        <span id="sc-badge-${m.wallet||Date.now()}" style="display:inline-flex;gap:3px"></span>
        <span style="font-size:0.6rem;opacity:0.5">${dt}</span>
      </div>
      <div class="chat-bubble">${esc(m.text||'').replace(/\n/g,'<br>')}</div>
    </div>`;
  msgs.appendChild(div);

  // バッジ表示
  if (m.wallet) {
    const slot = div.querySelector(`#sc-badge-${m.wallet}`);
    if (slot) {
      try {
        const top = window.top;
        if (top && typeof top.getUserBadges === 'function' && typeof top.makeBadgeHtml === 'function') {
          top.getUserBadges(m.wallet).then(badges => {
            if (!badges || !badges.length) return;
            slot.innerHTML = top.makeBadgeHtml(badges[0]);
          }).catch(()=>{});
        }
      } catch(e) {}
    }
  }
}

function scSendChat() {
  const inp = document.getElementById('scChatInput');
  const text = inp.value.trim();
  if (!text || !scSocket || !scSocket.connected) return;
  scSocket.emit('crossing message', { text });
  inp.value = '';
}

// ── 信号サイクル ──
(function() {
  let phase = 0;
  const cycles = [[1,0,0],[0,1,0],[0,0,1]];
  function tick() {
    const [r,y,g] = cycles[phase % 3];
    ['s1','s2'].forEach(s => {
      document.getElementById(s+'r').className = 'bulb' + (r?' on-r':'');
      document.getElementById(s+'y').className = 'bulb' + (y?' on-y':'');
      document.getElementById(s+'g').className = 'bulb' + (g?' on-g':'');
    });
    ['s3','s4'].forEach(s => {
      document.getElementById(s+'r').className = 'bulb' + (g?' on-r':'');
      document.getElementById(s+'y').className = 'bulb' + (y?' on-y':'');
      document.getElementById(s+'g').className = 'bulb' + (r?' on-g':'');
    });
    phase++;
    const delay = phase%3===0?2000:phase%3===1?6000:8000;
    setTimeout(tick, delay);
  }
  tick();
})();

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Socket.io CDN
const script = document.createElement('script');
script.src = SC_SOCKET_URL + '/socket.io/socket.io.js';
script.onload = () => {};
document.head.appendChild(script);

scInitFirestore();
</script>
</body>
</html>
