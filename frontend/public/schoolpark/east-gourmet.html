<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SchoolPark グルメエリア</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   BASE / TOKENS
   ============================================================ */
:root {
  --bg:        #0f111a;
  --bg2:       #151825;
  --bg3:       #1c1f2e;
  --bg4:       #242840;
  --gold:      #D4A843;
  --gold-dim:  #a07e2e;
  --orange:    #E07C40;
  --emerald:   #4CAF82;
  --red:       #e05555;
  --text:      #e8eaf0;
  --text2:     #9ba3bc;
  --text3:     #5c6278;
  --border:    rgba(212,168,67,.18);
  --border2:   rgba(255,255,255,.06);
  --radius:    14px;
  --radius-sm: 8px;
  --shadow:    0 8px 32px rgba(0,0,0,.45);
  --glow-gold: 0 0 20px rgba(212,168,67,.45);
  --glow-btn:  0 0 28px rgba(212,168,67,.35);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  font-family: 'Inter', 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
}

/* ============================================================
   SCROLLBAR
   ============================================================ */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 4px; }

/* ============================================================
   PAGE SYSTEM
   ============================================================ */
.page {
  position: absolute; inset: 0;
  display: none;
  flex-direction: column;
  overflow: hidden;
}
.page.active { display: flex; }

/* ============================================================
   NAV BAR
   ============================================================ */
.nav {
  flex-shrink: 0;
  display: flex; align-items: center;
  gap: 8px;
  padding: 10px 16px;
  background: rgba(15,17,26,.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border2);
  z-index: 10;
}
.nav-brand {
  display: flex; align-items: center; gap: 8px;
  flex: 1;
}
.nav-logo {
  width: 28px; height: 28px;
  background: linear-gradient(135deg, var(--gold), var(--orange));
  border-radius: 8px;
  display: grid; place-items: center;
  font-weight: 800; font-size: 13px; color: #0f111a;
}
.nav-title {
  font-size: 14px; font-weight: 700;
  background: linear-gradient(90deg, var(--gold), var(--orange));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  letter-spacing: .5px;
}
.nav-subtitle { font-size: 10px; color: var(--text3); margin-top: 1px; }

.nav-btn {
  flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 5px 8px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text2);
  font-size: 9px;
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
}
.nav-btn span:first-child { font-size: 15px; }
.nav-btn:hover { background: var(--bg4); color: var(--gold); border-color: var(--border); }

.nav-exit {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 12px;
  background: transparent;
  border: 1px solid rgba(224,85,85,.4);
  border-radius: var(--radius-sm);
  color: #e07070;
  font-size: 11px; font-weight: 600;
  cursor: pointer;
  transition: all .2s;
}
.nav-exit:hover { background: rgba(224,85,85,.12); border-color: var(--red); }

/* ============================================================
   FILTER TABS
   ============================================================ */
.filter-bar {
  flex-shrink: 0;
  display: flex; gap: 8px;
  padding: 10px 16px;
  overflow-x: auto;
  scrollbar-width: none;
  border-bottom: 1px solid var(--border2);
}
.filter-bar::-webkit-scrollbar { display: none; }
.filter-tab {
  flex-shrink: 0;
  padding: 6px 16px;
  border-radius: 999px;
  border: 1px solid var(--border2);
  background: var(--bg3);
  color: var(--text2);
  font-size: 12px; font-weight: 500;
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
}
.filter-tab:hover { border-color: var(--border); color: var(--gold); }
.filter-tab.active {
  background: linear-gradient(135deg, rgba(212,168,67,.18), rgba(224,124,64,.12));
  border-color: var(--gold);
  color: var(--gold);
  font-weight: 600;
}

/* ============================================================
   SCROLL CONTENT
   ============================================================ */
.scroll-area {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}

/* ============================================================
   HERO
   ============================================================ */
.hero {
  position: relative;
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 20px;
  padding: 32px 24px;
  background: linear-gradient(135deg, #1a1420 0%, #0f111a 50%, #0e1520 100%);
  border: 1px solid var(--border);
}
.hero::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 60% 60% at 80% 50%, rgba(212,168,67,.12) 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 10% 80%, rgba(224,124,64,.08) 0%, transparent 60%);
  pointer-events: none;
}
.hero-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px;
  background: rgba(212,168,67,.12);
  border: 1px solid rgba(212,168,67,.3);
  border-radius: 999px;
  font-size: 10px; font-weight: 600;
  color: var(--gold);
  margin-bottom: 12px;
  letter-spacing: .5px;
  text-transform: uppercase;
}
.hero-badge::before { content: '●'; font-size: 7px; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

.hero h1 {
  font-size: 26px; font-weight: 800;
  line-height: 1.2;
  margin-bottom: 6px;
  background: linear-gradient(135deg, #fff 0%, var(--gold) 60%, var(--orange) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.hero-sub {
  font-size: 13px; color: var(--text2);
  margin-bottom: 20px;
  font-family: 'Noto Sans JP', sans-serif;
}
.hero-stats {
  display: flex; gap: 24px;
}
.hero-stat { display: flex; flex-direction: column; gap: 2px; }
.hero-stat-num {
  font-size: 22px; font-weight: 800;
  color: var(--gold);
}
.hero-stat-label { font-size: 10px; color: var(--text3); font-weight: 500; }

.hero-img {
  position: absolute; right: 0; top: 0; bottom: 0;
  width: 200px;
  display: grid; place-items: center;
  font-size: 80px;
  opacity: .18;
  pointer-events: none;
  user-select: none;
}

/* ============================================================
   FEATURED BANNER
   ============================================================ */
.section-label {
  font-size: 11px; font-weight: 600;
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.section-label::after {
  content: '';
  flex: 1; height: 1px;
  background: linear-gradient(90deg, var(--border), transparent);
}

.featured-banner {
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 24px;
  background: var(--bg2);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: transform .25s, box-shadow .25s;
  position: relative;
}
.featured-banner:hover { transform: translateY(-2px); box-shadow: var(--glow-gold); }

.featured-inner {
  display: flex; align-items: stretch; gap: 0;
}
.featured-img {
  width: 120px; flex-shrink: 0;
  background: linear-gradient(135deg, #2a1a0e, #1a1206);
  display: grid; place-items: center;
  font-size: 52px;
}
.featured-content {
  flex: 1; padding: 16px;
}
.featured-tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px;
  background: rgba(212,168,67,.12);
  border: 1px solid rgba(212,168,67,.25);
  border-radius: 4px;
  font-size: 9px; font-weight: 700; color: var(--gold);
  text-transform: uppercase; letter-spacing: .5px;
  margin-bottom: 6px;
}
.featured-name {
  font-size: 16px; font-weight: 700;
  margin-bottom: 4px;
}
.featured-shop { font-size: 11px; color: var(--text2); margin-bottom: 8px; }
.featured-price-row {
  display: flex; align-items: center; gap: 10px;
}
.featured-price-emuer {
  font-size: 18px; font-weight: 800;
  color: var(--gold);
}
.featured-price-yen {
  font-size: 12px; color: var(--text3);
  text-decoration: line-through;
}
.featured-discount {
  padding: 2px 7px;
  background: rgba(224,124,64,.15);
  border: 1px solid rgba(224,124,64,.3);
  border-radius: 4px;
  font-size: 10px; font-weight: 700; color: var(--orange);
}

/* ============================================================
   SHOP CARDS
   ============================================================ */
.shop-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}
.shop-card {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: all .25s;
}
.shop-card:hover {
  border-color: var(--border);
  box-shadow: var(--glow-gold);
  transform: translateY(-3px);
}
.shop-card-img {
  height: 90px;
  background: var(--bg3);
  display: grid; place-items: center;
  font-size: 44px;
  position: relative;
}
.shop-genre-badge {
  position: absolute; top: 8px; left: 8px;
  padding: 2px 7px;
  border-radius: 4px;
  font-size: 9px; font-weight: 700;
  background: rgba(15,17,26,.75);
  border: 1px solid var(--border2);
  color: var(--text2);
  backdrop-filter: blur(4px);
}
.shop-card-body { padding: 10px 12px; }
.shop-card-name {
  font-size: 13px; font-weight: 700;
  margin-bottom: 3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.shop-card-meta {
  display: flex; align-items: center; gap: 4px;
  font-size: 10px; color: var(--text2);
  margin-bottom: 8px;
}
.stars { color: var(--gold); font-size: 10px; }
.shop-card-price-row {
  display: flex; align-items: center; justify-content: space-between;
}
.shop-card-from { font-size: 9px; color: var(--text3); }
.shop-card-emuer {
  font-size: 13px; font-weight: 700;
  color: var(--gold);
}

/* ============================================================
   SHOP DETAIL PAGE
   ============================================================ */
.shop-header {
  position: relative;
  padding: 20px 16px 16px;
  background: linear-gradient(180deg, var(--bg3) 0%, transparent 100%);
  border-bottom: 1px solid var(--border2);
}
.back-btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 10px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text2);
  font-size: 11px;
  cursor: pointer;
  transition: all .2s;
  margin-bottom: 14px;
}
.back-btn:hover { background: var(--bg4); color: var(--text); }
.shop-header-inner { display: flex; gap: 14px; align-items: center; }
.shop-header-icon {
  width: 60px; height: 60px; border-radius: 12px; flex-shrink: 0;
  background: var(--bg4);
  display: grid; place-items: center;
  font-size: 30px;
  border: 2px solid var(--border);
}
.shop-header-info { flex: 1; }
.shop-header-name { font-size: 20px; font-weight: 800; margin-bottom: 3px; }
.shop-header-genre {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px;
  background: rgba(212,168,67,.1);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 10px; font-weight: 600; color: var(--gold);
  margin-bottom: 6px;
}
.shop-header-detail { font-size: 11px; color: var(--text2); }

.section-title-bar {
  display: flex; align-items: center; justify-content: space-between;
  margin: 16px 0 10px;
}
.section-title-bar h3 {
  font-size: 14px; font-weight: 700;
  color: var(--text);
}

/* ============================================================
   NFT MENU CARDS
   ============================================================ */
.menu-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}

.nft-card {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: all .3s;
  position: relative;
}
.nft-card:hover {
  border-color: var(--gold);
  box-shadow: 0 0 0 1px rgba(212,168,67,.3), var(--glow-gold);
  transform: translateY(-2px);
}
.nft-card-img {
  height: 110px;
  background: var(--bg3);
  display: grid; place-items: center;
  font-size: 50px;
  position: relative;
  overflow: hidden;
}
.nft-card-img img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform .4s;
}
.nft-card:hover .nft-card-img img { transform: scale(1.05); }

.nft-badge {
  position: absolute; top: 8px; right: 8px;
  padding: 2px 7px;
  background: rgba(15,17,26,.8);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 8px; font-weight: 700; color: var(--gold);
  backdrop-filter: blur(6px);
  letter-spacing: .5px;
  text-transform: uppercase;
}

.nft-card-body { padding: 10px 12px 12px; }
.nft-card-name {
  font-size: 12px; font-weight: 700;
  margin-bottom: 4px;
  line-height: 1.3;
}
.nft-price-row {
  display: flex; align-items: baseline; gap: 5px;
  margin-bottom: 8px;
}
.nft-price-emuer {
  font-size: 15px; font-weight: 800; color: var(--gold);
}
.nft-price-unit { font-size: 10px; color: var(--gold); font-weight: 600; }
.nft-price-yen { font-size: 10px; color: var(--text3); text-decoration: line-through; }

.btn-buy {
  width: 100%;
  padding: 8px;
  border-radius: var(--radius-sm);
  border: none;
  background: linear-gradient(135deg, var(--gold), #c49030, var(--orange));
  color: #0f111a;
  font-size: 11px; font-weight: 700;
  cursor: pointer;
  transition: all .2s;
  letter-spacing: .3px;
}
.btn-buy:hover {
  box-shadow: var(--glow-btn);
  filter: brightness(1.1);
}
.btn-buy.owned {
  background: linear-gradient(135deg, var(--emerald), #3a9468);
  color: #fff;
}
.btn-buy.login-required {
  background: var(--bg4);
  color: var(--text2);
  border: 1px solid var(--border2);
}
.btn-buy.login-required:hover {
  border-color: var(--border);
  color: var(--text);
  box-shadow: none;
  filter: none;
}

/* ============================================================
   REVIEW
   ============================================================ */
.review-list { display: flex; flex-direction: column; gap: 10px; }
.review-item {
  padding: 12px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
}
.review-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 5px;
}
.review-user { font-size: 12px; font-weight: 600; }
.review-stars { font-size: 11px; }
.review-date { font-size: 10px; color: var(--text3); margin-top: 1px; }
.review-text { font-size: 12px; color: var(--text2); line-height: 1.5; margin-top: 5px; }
.review-nft-tag {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 2px 7px;
  background: rgba(212,168,67,.08);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 9px; color: var(--gold);
  margin-top: 6px;
}

/* ============================================================
   MY NFT PAGE
   ============================================================ */
.my-nft-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 14px;
}

.my-nft-card {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  overflow: hidden;
  transition: all .3s;
  position: relative;
}
.my-nft-card:not(.used):hover {
  border-color: var(--gold);
  box-shadow: var(--glow-gold);
}
.my-nft-card.used { opacity: .45; filter: grayscale(.8); }

.my-nft-img {
  height: 100px;
  background: var(--bg3);
  display: grid; place-items: center;
  font-size: 46px;
  position: relative;
  overflow: hidden;
}
.my-nft-img img { width:100%;height:100%;object-fit:cover; }
.my-nft-used-overlay {
  position: absolute; inset: 0;
  display: none;
  background: rgba(15,17,26,.7);
  place-items: center;
  font-size: 11px; font-weight: 700; color: #888;
}
.used .my-nft-used-overlay { display: grid; }

.my-nft-body { padding: 10px 12px 12px; }
.my-nft-name { font-size: 12px; font-weight: 700; margin-bottom: 2px; }
.my-nft-shop { font-size: 10px; color: var(--text2); margin-bottom: 6px; }
.my-nft-expiry {
  display: flex; align-items: center; gap: 4px;
  font-size: 10px;
  margin-bottom: 8px;
}
.expiry-ok { color: var(--emerald); }
.expiry-soon { color: var(--orange); }

.btn-qr {
  width: 100%;
  padding: 7px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--gold);
  font-size: 11px; font-weight: 600;
  cursor: pointer;
  transition: all .2s;
}
.btn-qr:hover { background: rgba(212,168,67,.08); }
.my-nft-card.used .btn-qr { pointer-events: none; color: var(--text3); border-color: var(--border2); }

/* ============================================================
   MODAL
   ============================================================ */
.modal-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,.7);
  backdrop-filter: blur(6px);
  place-items: center;
  padding: 20px;
  animation: fadeIn .2s ease;
}
.modal-overlay.open { display: grid; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.modal {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 18px;
  width: 100%; max-width: 360px;
  max-height: 90vh;
  overflow-y: auto;
  animation: scaleIn .25s cubic-bezier(.34,1.56,.64,1);
  position: relative;
}
@keyframes scaleIn { from{transform:scale(.88);opacity:0} to{transform:scale(1);opacity:1} }

.modal-header {
  padding: 18px 20px 0;
  display: flex; align-items: center; justify-content: space-between;
}
.modal-title { font-size: 16px; font-weight: 800; }
.modal-close {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 1px solid var(--border2);
  background: var(--bg3);
  display: grid; place-items: center;
  cursor: pointer; color: var(--text2);
  font-size: 14px;
  transition: all .2s;
}
.modal-close:hover { background: var(--bg4); color: var(--text); }

.modal-body { padding: 16px 20px 20px; }

/* Steps */
.step-indicator {
  display: flex; gap: 6px; justify-content: center;
  margin-bottom: 20px;
}
.step-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--bg4);
  transition: all .3s;
}
.step-dot.active { background: var(--gold); box-shadow: 0 0 6px rgba(212,168,67,.6); }
.step-dot.done { background: var(--emerald); }

.modal-dish-img {
  height: 140px; width: 100%;
  border-radius: 10px; overflow: hidden;
  background: var(--bg3);
  display: grid; place-items: center;
  font-size: 64px;
  margin-bottom: 14px;
  position: relative;
}
.modal-dish-img img { width:100%;height:100%;object-fit:cover; }

.modal-dish-name { font-size: 16px; font-weight: 700; margin-bottom: 3px; }
.modal-dish-shop { font-size: 12px; color: var(--text2); margin-bottom: 14px; }

.price-display {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  margin-bottom: 14px;
}
.price-label { font-size: 12px; color: var(--text2); }
.price-value-emuer { font-size: 20px; font-weight: 800; color: var(--gold); }
.price-value-yen { font-size: 11px; color: var(--text3); }

/* Balance row */
.balance-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  margin-bottom: 10px;
}
.balance-label { font-size: 11px; color: var(--text2); }
.balance-value { font-size: 14px; font-weight: 700; }
.balance-ok { color: var(--emerald); }
.balance-ng { color: var(--red); }

.balance-error-msg {
  display: none;
  padding: 10px 14px;
  background: rgba(224,85,85,.1);
  border: 1px solid rgba(224,85,85,.3);
  border-radius: var(--radius-sm);
  font-size: 12px; color: var(--red);
  margin-bottom: 10px;
}
.balance-error-msg.show { display: block; }

.btn-confirm {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, var(--gold), #c49030, var(--orange));
  color: #0f111a;
  font-size: 13px; font-weight: 800;
  cursor: pointer;
  transition: all .2s;
  margin-top: 14px;
}
.btn-confirm:hover { box-shadow: var(--glow-btn); filter: brightness(1.08); }
.btn-confirm:disabled {
  opacity: .45;
  cursor: not-allowed;
  filter: grayscale(.5);
  box-shadow: none;
}
.btn-secondary {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text2);
  font-size: 13px; font-weight: 600;
  cursor: pointer;
  transition: all .2s;
  margin-top: 8px;
}
.btn-secondary:hover { background: var(--bg3); color: var(--text); }

/* Success */
.success-icon {
  width: 64px; height: 64px; border-radius: 50%;
  background: linear-gradient(135deg, var(--emerald), #3a9468);
  display: grid; place-items: center;
  font-size: 30px;
  margin: 0 auto 14px;
  box-shadow: 0 0 24px rgba(76,175,130,.5);
  animation: popIn .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn { from{transform:scale(0)} to{transform:scale(1)} }

.success-title { font-size: 18px; font-weight: 800; text-align: center; margin-bottom: 5px; }
.success-sub { font-size: 12px; color: var(--text2); text-align: center; margin-bottom: 18px; }

/* NFT card flipper */
.flip-wrapper {
  perspective: 600px;
  margin: 0 auto 16px;
  width: 200px; height: 200px;
  cursor: pointer;
}
.flip-inner {
  width: 100%; height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform .6s cubic-bezier(.34,1.2,.64,1);
}
.flip-wrapper:hover .flip-inner,
.flip-wrapper.flipped .flip-inner {
  transform: rotateY(180deg);
}
.flip-face {
  position: absolute; inset: 0;
  backface-visibility: hidden;
  border-radius: 14px;
  overflow: hidden;
  border: 1.5px solid var(--border);
}
.flip-face-back {
  transform: rotateY(180deg);
  background: var(--bg3);
  display: grid; place-items: center;
  font-size: 11px; color: var(--text2);
  flex-direction: column;
  gap: 6px;
}
.flip-face-front {
  background: var(--bg3);
  display: grid; place-items: center;
  font-size: 72px;
}
.flip-face-front img { width:100%;height:100%;object-fit:cover; }
.flip-hint {
  font-size: 10px; color: var(--text3); text-align: center; margin-bottom: 14px;
}

/* QR placeholder */
.qr-placeholder {
  width: 120px; height: 120px;
  margin: 0 auto 6px;
}
.qr-placeholder svg { width: 100%; height: 100%; }

/* QR Modal */
.qr-modal-img {
  display: flex; flex-direction: column; align-items: center;
  padding: 16px 0;
}
.qr-modal-label { font-size: 11px; color: var(--text2); margin-top: 8px; }

/* ============================================================
   CONFETTI
   ============================================================ */
#confetti-canvas {
  position: fixed; inset: 0; z-index: 200;
  pointer-events: none;
}

/* ============================================================
   WALLET BALANCE BADGE (nav area)
   ============================================================ */
.wallet-balance-badge {
  font-size: 9px; color: var(--gold);
  font-weight: 700;
}

/* ============================================================
   BOTTOM NAV (My NFT)
   ============================================================ */
.bottom-tab-bar {
  flex-shrink: 0;
  display: flex;
  border-top: 1px solid var(--border2);
  background: var(--bg);
}
.bottom-tab {
  flex: 1;
  padding: 8px 0;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  cursor: pointer;
  color: var(--text3);
  font-size: 9px;
  border: none; background: transparent;
  transition: color .2s;
}
.bottom-tab span:first-child { font-size: 18px; }
.bottom-tab.active { color: var(--gold); }
.bottom-tab:hover { color: var(--text2); }
.bottom-tab.active:hover { color: var(--gold); }

/* ============================================================
   MISC UTILITIES
   ============================================================ */
.divider {
  height: 1px;
  background: var(--border2);
  margin: 16px 0;
}
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text3);
}
.empty-state .empty-icon { font-size: 40px; margin-bottom: 10px; opacity: .4; }
.empty-state p { font-size: 13px; }
</style>
</head>

<script>
/* ============================================================
   DATA
   ============================================================ */
const SHOPS = [];

/* ============================================================
   STATE
   ============================================================ */
let loggedIn = true; // simulate logged-in
let emuerBalance = 120; // read from localStorage or use default

function loadBalance() {
  try {
    const raw = localStorage.getItem('emuerData');
    if (raw) {
      const d = JSON.parse(raw);
      if (typeof d.balance === 'number') emuerBalance = d.balance;
    }
  } catch(e) {}
}

// Owned NFTs: array of { menuId, shopId, dishName, shopName, emoji, img, expiry, used }
let ownedNFTs = [];
function loadOwnedNFTs() {
  try {
    const raw = localStorage.getItem('gourmetNFTs');
    if (raw) ownedNFTs = JSON.parse(raw);
  } catch(e) {}
}
function saveOwnedNFTs() {
  localStorage.setItem('gourmetNFTs', JSON.stringify(ownedNFTs));
}

/* ============================================================
   INIT
   ============================================================ */
loadBalance();
loadOwnedNFTs();
renderShopGrid();
updateBalanceBadges();

/* ============================================================
   postMessage bridge
   ============================================================ */
function postMsg(type) {
  window.top.postMessage({ type }, '*');
}

/* ============================================================
   PAGE NAVIGATION
   ============================================================ */
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');

  if (name === 'my-nft') renderMyNFT();
  updateBalanceBadges();
}

function openShop(shopId) {
  const shop = SHOPS[shopId];
  document.getElementById('shop-nav-title').textContent = shop.name;
  document.getElementById('shop-detail-content').innerHTML = renderShopDetail(shop);
  showPage('shop');
}

/* ============================================================
   BALANCE BADGE
   ============================================================ */
function updateBalanceBadges() {
  const txt = `${emuerBalance} E`;
  ['nav-balance','nav-balance-shop','nav-balance-mynft'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = txt;
  });
}

/* ============================================================
   SHOP GRID (HOME)
   ============================================================ */
function getFilteredShops() {
  const active = document.querySelector('.filter-tab.active');
  const f = active ? active.dataset.filter : 'all';
  if (f === 'all') return SHOPS;
  return SHOPS.filter(s => s.filter === f);
}

function renderShopGrid() {
  const grid = document.getElementById('shop-grid');
  const shops = getFilteredShops();
  if (shops.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🍽️</div><p>このカテゴリの店舗はまだありません</p></div>`;
    return;
  }
  grid.innerHTML = shops.map(s => `
    <div class="shop-card" onclick="openShop(${s.id})">
      <div class="shop-card-img">
        <img src="${s.img}" alt="" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0;" onerror="this.style.display='none'">
        <span style="z-index:1;position:relative;font-size:40px;">${s.icon}</span>
        <div class="shop-genre-badge">${s.genre}</div>
      </div>
      <div class="shop-card-body">
        <div class="shop-card-name">${s.name}</div>
        <div class="shop-card-meta">
          <span class="stars">${renderStars(s.rating)}</span>
          <span>${s.rating}</span>
          <span style="color:var(--text3)">(${s.reviews_count})</span>
        </div>
        <div class="shop-card-price-row">
          <span class="shop-card-from">FROM</span>
          <span class="shop-card-emuer">${s.minPrice} EMUER</span>
        </div>
      </div>
    </div>
  `).join('');
}

function renderStars(rating) {
  const full = Math.floor(rating);
  const half = rating - full >= 0.5 ? 1 : 0;
  return '★'.repeat(full) + (half ? '½' : '') + '☆'.repeat(5 - full - half);
}

// Filter tabs
document.querySelectorAll('.filter-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    renderShopGrid();
  });
});

/* ============================================================
   SHOP DETAIL RENDER
   ============================================================ */
function renderShopDetail(shop) {
  const menuCards = shop.menus.map(m => {
    const owned = ownedNFTs.some(n => n.menuId === m.id);
    let btnHtml;
    if (!loggedIn) {
      btnHtml = `<button class="btn-buy login-required" onclick="event.stopPropagation();openPurchaseModal(${shop.id},'${m.id}')">🔒 Googleでログイン</button>`;
    } else if (owned) {
      btnHtml = `<button class="btn-buy owned" onclick="event.stopPropagation();openQRFromMenu('${m.id}')">✓ 購入済み — QRを表示</button>`;
    } else {
      btnHtml = `<button class="btn-buy" onclick="event.stopPropagation();openPurchaseModal(${shop.id},'${m.id}')">NFTで購入する</button>`;
    }
    return `
      <div class="nft-card">
        <div class="nft-card-img">
          <img src="${m.img}" alt="${m.name}" onerror="this.style.display='none';this.parentNode.querySelector('.emoji-fallback').style.display='block'">
          <span class="emoji-fallback" style="display:none;font-size:50px;">${m.emoji}</span>
          <div class="nft-badge">NFT</div>
        </div>
        <div class="nft-card-body">
          <div class="nft-card-name">${m.name}</div>
          <div class="nft-price-row">
            <span class="nft-price-emuer">${m.emuer}</span>
            <span class="nft-price-unit">EMUER</span>
            <span class="nft-price-yen">¥${m.price.toLocaleString()}</span>
          </div>
          ${btnHtml}
        </div>
      </div>
    `;
  }).join('');

  const reviewsHtml = shop.reviews.map(r => `
    <div class="review-item">
      <div class="review-header">
        <span class="review-user">${r.user}</span>
        <span class="review-stars">${'★'.repeat(r.stars)}${'☆'.repeat(5-r.stars)}</span>
      </div>
      <div style="font-size:10px;color:var(--text3)">${r.date}</div>
      <div class="review-text">${r.text}</div>
      <div class="review-nft-tag">🎴 ${r.menu}</div>
    </div>
  `).join('');

  return `
    <div class="shop-header">
      <button class="back-btn" onclick="showPage('home')">← 一覧に戻る</button>
      <div class="shop-header-inner">
        <div class="shop-header-icon">${shop.icon}</div>
        <div class="shop-header-info">
          <div class="shop-header-name">${shop.name}</div>
          <div class="shop-header-genre">${shop.genre}</div>
          <div class="shop-header-detail">📍 ${shop.address}</div>
          <div class="shop-header-detail">🕐 ${shop.hours}</div>
        </div>
      </div>
    </div>
    <div style="padding:0 16px 16px;">
      <div class="divider"></div>
      <div style="font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:6px;">${shop.desc}</div>
      <div style="font-size:11px;color:var(--text3);">SNS: ${shop.social}</div>

      <div class="section-title-bar" style="margin-top:18px;">
        <h3>🎴 NFT メニュー</h3>
        <span style="font-size:11px;color:var(--text3)">${shop.menus.length} アイテム</span>
      </div>
      <div class="menu-grid">${menuCards}</div>

      <div class="section-label">✦ レビュー (${shop.reviews.length})</div>
      <div class="review-list">${reviewsHtml}</div>
      <div style="height:20px;"></div>
    </div>
  `;
}

/* ============================================================
   PURCHASE MODAL
   ============================================================ */
let currentShopId = null;
let currentMenuId = null;
let purchaseStep = 1;

function openPurchaseModal(shopId, menuId) {
  currentShopId = shopId;
  currentMenuId = menuId;
  purchaseStep = 1;
  renderPurchaseStep();
  document.getElementById('purchase-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('purchase-modal').classList.remove('open');
  // refresh shop detail if open
  if (document.getElementById('page-shop').classList.contains('active')) {
    const shop = SHOPS[currentShopId];
    document.getElementById('shop-detail-content').innerHTML = renderShopDetail(shop);
  }
}

function renderPurchaseStep() {
  const shop = SHOPS[currentShopId];
  const menu = shop.menus.find(m => m.id === currentMenuId);
  const modal = document.getElementById('purchase-modal');
  const body = document.getElementById('modal-body');
  const titleEl = document.getElementById('modal-title-text');

  if (purchaseStep === 1) {
    titleEl.textContent = 'メニューを確認';
    body.innerHTML = `
      ${stepIndicator(1)}
      <div class="modal-dish-img">
        <img src="${menu.img}" alt="${menu.name}" onerror="this.style.display='none';this.parentNode.querySelector('.ef').style.display='block'">
        <span class="ef" style="display:none;font-size:64px;">${menu.emoji}</span>
      </div>
      <div class="modal-dish-name">${menu.name}</div>
      <div class="modal-dish-shop">${shop.name}</div>
      <div class="price-display">
        <div>
          <div class="price-label">NFT 価格</div>
          <div class="price-value-yen">通常 ¥${menu.price.toLocaleString()}</div>
        </div>
        <div style="text-align:right;">
          <div class="price-value-emuer">${menu.emuer} EMUER</div>
        </div>
      </div>
      <button class="btn-confirm" onclick="purchaseStep=2;renderPurchaseStep()">次へ — ウォレット確認</button>
      <button class="btn-secondary" onclick="closeModal()">キャンセル</button>
    `;
  } else if (purchaseStep === 2) {
    loadBalance();
    const enough = emuerBalance >= menu.emuer;
    const diff = menu.emuer - emuerBalance;
    titleEl.textContent = 'ウォレット残高確認';
    body.innerHTML = `
      ${stepIndicator(2)}
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
        <div class="modal-dish-img" style="height:80px;width:80px;border-radius:10px;margin:0;font-size:36px;flex-shrink:0;">
          <img src="${menu.img}" alt="" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none'">
        </div>
        <div>
          <div style="font-size:13px;font-weight:700;">${menu.name}</div>
          <div style="font-size:11px;color:var(--text2);">${shop.name}</div>
          <div style="font-size:16px;font-weight:800;color:var(--gold);margin-top:3px;">${menu.emuer} EMUER</div>
        </div>
      </div>
      <div class="balance-row">
        <span class="balance-label">💰 現在の残高</span>
        <span class="balance-value ${enough ? 'balance-ok' : 'balance-ng'}">${emuerBalance} EMUER</span>
      </div>
      <div class="balance-row">
        <span class="balance-label">支払い金額</span>
        <span class="balance-value" style="color:var(--text);">− ${menu.emuer} EMUER</span>
      </div>
      <div class="balance-row">
        <span class="balance-label">購入後の残高</span>
        <span class="balance-value ${enough ? 'balance-ok' : 'balance-ng'}">${emuerBalance - menu.emuer} EMUER</span>
      </div>
      <div class="balance-error-msg ${enough ? '' : 'show'}">
        ⚠️ 残高が足りません（あと <strong>${diff} EMUER</strong> 必要です）
      </div>
      <button class="btn-confirm" ${enough ? '' : 'disabled'} onclick="purchaseStep=3;renderPurchaseStep()">
        ${menu.emuer} EMUER を支払って購入
      </button>
      <button class="btn-secondary" onclick="purchaseStep=1;renderPurchaseStep()">← 戻る</button>
    `;
  } else if (purchaseStep === 3) {
    // Processing animation
    titleEl.textContent = '処理中...';
    body.innerHTML = `
      ${stepIndicator(3)}
      <div style="text-align:center;padding:40px 0;">
        <div style="font-size:40px;animation:spin 1s linear infinite;display:inline-block;">⏳</div>
        <div style="margin-top:14px;font-size:14px;color:var(--text2);">NFTを発行中です...</div>
        <div style="margin-top:6px;font-size:11px;color:var(--text3);">ブロックチェーンに記録しています</div>
      </div>
    `;
    setTimeout(() => {
      // Commit purchase
      const expiry = new Date();
      expiry.setDate(expiry.getDate() + 30);
      ownedNFTs.push({
        menuId: menu.id,
        shopId: shop.id,
        dishName: menu.name,
        shopName: shop.name,
        emoji: menu.emoji,
        img: menu.img,
        expiry: expiry.toLocaleDateString('ja-JP'),
        used: false
      });
      emuerBalance -= menu.emuer;
      saveOwnedNFTs();
      try {
        const raw = localStorage.getItem('emuerData');
        const d = raw ? JSON.parse(raw) : {};
        d.balance = emuerBalance;
        localStorage.setItem('emuerData', JSON.stringify(d));
      } catch(e) {}
      updateBalanceBadges();
      purchaseStep = 4;
      renderPurchaseStep();
      launchConfetti();
    }, 1800);
  } else if (purchaseStep === 4) {
    titleEl.textContent = '購入完了！';
    const expiry = ownedNFTs.find(n => n.menuId === menu.id);
    body.innerHTML = `
      ${stepIndicator(4)}
      <div class="success-icon">✓</div>
      <div class="success-title">NFT を取得しました！</div>
      <div class="success-sub">QRコードを実店舗のスタッフに提示してください</div>

      <div class="flip-wrapper" id="flip-card" onclick="this.classList.toggle('flipped')">
        <div class="flip-inner">
          <div class="flip-face flip-face-front">
            <img src="${menu.img}" alt="${menu.name}" onerror="this.style.display='none';this.nextSibling.style.display='block'">
            <span style="display:none;font-size:72px;">${menu.emoji}</span>
          </div>
          <div class="flip-face flip-face-back">
            <div>
              <div class="qr-placeholder">${generateQRSVG(menu.id)}</div>
              <div style="margin-top:6px;font-size:10px;color:var(--text2);text-align:center;">${menu.name}</div>
            </div>
          </div>
        </div>
      </div>
      <div class="flip-hint">タップでQRコードを表示</div>

      <div style="display:flex;gap:8px;">
        <div style="flex:1;padding:10px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;text-align:center;">
          <div style="font-size:10px;color:var(--text3);">有効期限</div>
          <div style="font-size:12px;font-weight:700;color:var(--orange);margin-top:2px;">${expiry ? expiry.expiry : '30日間'}</div>
        </div>
        <div style="flex:1;padding:10px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;text-align:center;">
          <div style="font-size:10px;color:var(--text3);">残高</div>
          <div style="font-size:12px;font-weight:700;color:var(--gold);margin-top:2px;">${emuerBalance} EMUER</div>
        </div>
      </div>

      <button class="btn-confirm" style="margin-top:14px;" onclick="closeModal();showPage('my-nft')">マイNFTで確認する</button>
      <button class="btn-secondary" onclick="closeModal()">閉じる</button>
    `;
  }
}

function stepIndicator(current) {
  return `<div class="step-indicator">
    ${[1,2,3,4].map(i => `<div class="step-dot ${i < current ? 'done' : i === current ? 'active' : ''}"></div>`).join('')}
  </div>`;
}

/* ============================================================
   QR MODAL
   ============================================================ */
function openQRFromMenu(menuId) {
  const nft = ownedNFTs.find(n => n.menuId === menuId);
  if (!nft) return;
  showQRModal(nft);
}

function showQRModal(nft) {
  document.getElementById('qr-display').innerHTML = generateQRSVG(nft.menuId);
  document.getElementById('qr-dish-name').textContent = nft.dishName;
  document.getElementById('qr-shop-name').textContent = nft.shopName;
  document.getElementById('qr-expiry').textContent = nft.expiry;
  document.getElementById('qr-modal').classList.add('open');
}

function closeQRModal() {
  document.getElementById('qr-modal').classList.remove('open');
}

/* ============================================================
   MY NFT PAGE
   ============================================================ */
function renderMyNFT() {
  const container = document.getElementById('my-nft-content');
  if (ownedNFTs.length === 0) {
    container.innerHTML = `
      <div style="padding:16px;">
        <div class="section-label">✦ 所持 NFT (0)</div>
        <div class="empty-state">
          <div class="empty-icon">🎴</div>
          <p>まだ NFT を購入していません。</p>
          <p style="margin-top:8px;font-size:12px;color:var(--text3)">グルメエリアで好きなメニューを購入してみよう！</p>
        </div>
      </div>
    `;
    return;
  }

  const cardsHtml = ownedNFTs.map((nft, idx) => {
    const expClass = nft.used ? '' : 'expiry-ok';
    const btnHtml = nft.used
      ? `<button class="btn-qr" disabled>使用済み</button>`
      : `<button class="btn-qr" onclick="showQRModal(${JSON.stringify(nft).replace(/"/g,"'")})">📱 QRを表示</button>`;
    return `
      <div class="my-nft-card ${nft.used ? 'used' : ''}">
        <div class="my-nft-img">
          <img src="${nft.img}" alt="${nft.dishName}" onerror="this.style.display='none';this.nextSibling.style.display='block'">
          <span style="display:none;font-size:46px;">${nft.emoji}</span>
          <div class="my-nft-used-overlay">使用済み</div>
        </div>
        <div class="my-nft-body">
          <div class="my-nft-name">${nft.dishName}</div>
          <div class="my-nft-shop">${nft.shopName}</div>
          <div class="my-nft-expiry">
            <span style="font-size:11px;">⏰</span>
            <span class="${expClass}">有効 ${nft.expiry}まで</span>
          </div>
          ${btnHtml}
        </div>
      </div>
    `;
  }).join('');

  const usedCount = ownedNFTs.filter(n => n.used).length;
  container.innerHTML = `
    <div style="padding:16px;">
      <div style="display:flex;gap:12px;margin-bottom:16px;">
        <div style="flex:1;padding:12px;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;text-align:center;">
          <div style="font-size:22px;font-weight:800;color:var(--gold);">${ownedNFTs.length}</div>
          <div style="font-size:10px;color:var(--text3);margin-top:2px;">保有 NFT</div>
        </div>
        <div style="flex:1;padding:12px;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;text-align:center;">
          <div style="font-size:22px;font-weight:800;color:var(--emerald);">${ownedNFTs.length - usedCount}</div>
          <div style="font-size:10px;color:var(--text3);margin-top:2px;">未使用</div>
        </div>
        <div style="flex:1;padding:12px;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;text-align:center;">
          <div style="font-size:22px;font-weight:800;color:var(--text3);">${usedCount}</div>
          <div style="font-size:10px;color:var(--text3);margin-top:2px;">使用済み</div>
        </div>
      </div>
      <div class="section-label">✦ 所持 NFT (${ownedNFTs.length})</div>
      <div class="my-nft-grid">${cardsHtml}</div>
    </div>
  `;
}

/* ============================================================
   QR CODE GENERATOR (simple SVG pattern)
   ============================================================ */
function generateQRSVG(seed) {
  // Pseudo-random QR visual based on seed string
  const s = String(seed);
  let hash = 0;
  for (let i = 0; i < s.length; i++) hash = ((hash << 5) - hash) + s.charCodeAt(i);
  hash = Math.abs(hash);

  const size = 21;
  const cellSize = 5;
  const total = size * cellSize;
  let cells = '';

  // Generate pseudo-random cell pattern
  const rand = (n) => {
    hash = ((hash * 1664525 + 1013904223) >>> 0);
    return hash % n;
  };

  // Position detection patterns (corners)
  const fixed = new Set();
  [[0,0],[0,14],[14,0]].forEach(([r,c]) => {
    for (let dr=0; dr<7; dr++) for (let dc=0; dc<7; dc++) {
      const key = `${r+dr},${c+dc}`;
      fixed.add(key);
      const inBorder = dr===0||dr===6||dc===0||dc===6;
      const inInner = dr>=2&&dr<=4&&dc>=2&&dc<=4;
      if (inBorder || inInner) {
        cells += `<rect x="${(c+dc)*cellSize}" y="${(r+dr)*cellSize}" width="${cellSize}" height="${cellSize}" fill="#000"/>`;
      }
    }
  });

  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      if (fixed.has(`${r},${c}`)) continue;
      if (rand(2) === 0) {
        cells += `<rect x="${c*cellSize}" y="${r*cellSize}" width="${cellSize}" height="${cellSize}" fill="#000"/>`;
      }
    }
  }

  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${total} ${total}" width="${total}" height="${total}">
    <rect width="${total}" height="${total}" fill="white"/>
    ${cells}
  </svg>`;
}

/* ============================================================
   CONFETTI
   ============================================================ */
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const colors = ['#D4A843','#E07C40','#4CAF82','#ffffff','#e8eaf0','#f0c040'];
  const particles = Array.from({length: 80}, () => ({
    x: Math.random() * canvas.width,
    y: -10,
    w: Math.random() * 8 + 4,
    h: Math.random() * 4 + 2,
    color: colors[Math.floor(Math.random() * colors.length)],
    vy: Math.random() * 3 + 2,
    vx: (Math.random() - .5) * 2,
    rot: Math.random() * 360,
    vrot: (Math.random() - .5) * 8,
    opacity: 1
  }));

  let frame = 0;
  function tick() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    frame++;
    let alive = false;
    particles.forEach(p => {
      if (p.y > canvas.height + 20) return;
      p.y += p.vy;
      p.x += p.vx;
      p.rot += p.vrot;
      if (frame > 80) p.opacity -= .015;
      p.opacity = Math.max(0, p.opacity);
      ctx.save();
      ctx.globalAlpha = p.opacity;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
      if (p.opacity > 0) alive = true;
    });
    if (alive) requestAnimationFrame(tick);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  requestAnimationFrame(tick);
}

/* ============================================================
   CSS spin keyframe (used in step 3)
   ============================================================ */
const styleTag = document.createElement('style');
styleTag.textContent = `@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }`;
document.head.appendChild(styleTag);
</script>
