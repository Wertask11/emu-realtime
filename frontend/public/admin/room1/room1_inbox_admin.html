<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Room1｜管理画面</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; }
body { background:#0f0f0f; color:#d4d4d4; font-family:system-ui,sans-serif; margin:0; }
.container { max-width:960px; margin:auto; padding:24px; }
h1 { font-size:20px; color:#fff; margin:0 0 28px; border-bottom:1px solid #2a2a2a; padding-bottom:16px; }

.tabs { display:flex; margin-bottom:28px; border-bottom:2px solid #2a2a2a; }
.tab-btn {
  padding:10px 20px; background:transparent; border:none; color:#888;
  font-size:14px; cursor:pointer; border-bottom:2px solid transparent;
  margin-bottom:-2px; transition:0.15s;
}
.tab-btn:hover { color:#d4d4d4; }
.tab-btn.active { color:#4ec9b0; border-bottom-color:#4ec9b0; font-weight:bold; }
.tab-content { display:none; }
.tab-content.active { display:block; }

/* 直接追加フォーム */
.direct-form {
  background:#161616; border:1px solid #2a2a2a;
  border-radius:10px; padding:24px; margin-bottom:24px;
}
.direct-form h2 { margin:0 0 20px; font-size:15px; color:#4ec9b0; }
.form-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; margin-bottom:16px; }
.form-field { display:flex; flex-direction:column; gap:6px; }
.form-field label { font-size:12px; color:#888; }
.direct-form select,
.direct-form textarea,
.direct-form input[type="text"] {
  width:100%; background:#0f0f0f; color:#d4d4d4;
  border:1px solid #333; border-radius:6px;
  padding:8px 10px; font-family:inherit; font-size:13px;
  transition:border-color 0.2s;
}
.direct-form select:focus,
.direct-form textarea:focus,
.direct-form input[type="text"]:focus { border-color:#4ec9b0; outline:none; }
.direct-form select:disabled { opacity:0.4; cursor:not-allowed; }
.direct-form textarea { resize:vertical; }
#subsub-row { display:none; }
.form-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:18px; }
.btn-add {
  background:#4ec9b0; color:#0f0f0f; border:none; border-radius:6px;
  padding:10px 22px; font-size:14px; font-weight:bold; cursor:pointer;
}
.btn-add:hover { opacity:0.85; }
.btn-add:disabled { opacity:0.4; cursor:not-allowed; }
.btn-clear {
  background:transparent; color:#888; border:1px solid #333;
  border-radius:6px; padding:10px 16px; font-size:14px; cursor:pointer;
}
.btn-clear:hover { border-color:#666; color:#d4d4d4; }
.toast { display:none; margin-top:14px; padding:10px 16px; border-radius:6px; font-size:13px; }
.toast.success { background:rgba(78,201,176,0.1); border:1px solid #4ec9b0; color:#4ec9b0; }
.toast.error { background:rgba(244,71,71,0.1); border:1px solid #f44747; color:#f44747; }

/* お預かり箱 */
.inbox-item {
  background:#161616; border:1px solid #2a2a2a;
  border-radius:8px; padding:18px; margin-bottom:14px;
}
.item-meta { font-size:12px; color:#666; margin-bottom:10px; display:flex; gap:12px; flex-wrap:wrap; }
.tag {
  background:#1e1e1e; border:1px solid #333; border-radius:4px;
  padding:2px 8px; color:#888; font-size:11px;
}
.item-content { color:#c8c8c8; font-size:14px; line-height:1.7; margin-bottom:14px; white-space:pre-wrap; }
.item-actions { display:flex; gap:8px; }
.btn-approve { background:#2ecc71; color:#0f0f0f; border:none; border-radius:4px; padding:8px 16px; font-size:13px; font-weight:bold; cursor:pointer; }
.btn-approve:hover { opacity:0.85; }
.btn-reject { background:#3a3a3a; color:#888; border:none; border-radius:4px; padding:8px 16px; font-size:13px; cursor:pointer; }
.btn-reject:hover { background:#444; color:#d4d4d4; }
.editor {
  display:none; margin-top:16px; border-top:1px dashed #333; padding-top:16px;
}
.editor h4 { margin:0 0 12px; font-size:13px; color:#888; }
.editor-label { font-size:12px; color:#888; display:block; margin-bottom:4px; }
.editor textarea,
.editor input[type="text"] {
  width:100%; background:#0f0f0f; color:#d4d4d4;
  border:1px solid #2a2a2a; border-radius:4px;
  padding:8px; margin-bottom:12px; font-family:inherit; font-size:13px;
  box-sizing:border-box;
}
.editor textarea { resize:vertical; }
.editor-actions { display:flex; gap:8px; margin-top:4px; }
.empty-state { text-align:center; color:#555; padding:48px 24px; font-size:14px; }
.loading { text-align:center; color:#666; padding:32px; }
</style>
</head>

<body>
<div class="container">
  <h1>📚 Room1 管理画面</h1>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('direct')">✏️ 直接追加</button>
    <button class="tab-btn" onclick="switchTab('inbox')">📮 お預かり箱 <span id="inbox-count" style="color:#666;"></span></button>
    <button class="tab-btn" onclick="switchTab('fountain-board')">⛲ 掲示板投稿</button>
    <button class="tab-btn" onclick="switchTab('fountain-event')">🎉 イベント投稿</button>
    <button class="tab-btn" onclick="switchTab('dao-votes');loadDAOVotes()">🗳️ DAO投票</button>
    <button class="tab-btn" onclick="deleteAllContents()" style="margin-left:auto;color:#f44747;border-bottom-color:transparent;">🗑️ コンテンツ全削除</button>
  </div>

  <!-- タブ1: 直接追加 -->
  <div id="tab-direct" class="tab-content active">
    <div class="direct-form">
      <h2>📝 学習コンテンツを直接追加</h2>
      <div class="form-grid">
        <div class="form-field">
          <label>テーマ *</label>
          <select id="da-theme" onchange="onThemeChange()">
            <option value="">選択してください</option>
            <option value="money">マネーリテラシー</option>
            <option value="net">ネットリテラシー</option>
            <option value="life">ライフリテラシー</option>
            <option value="blue">ブルーファイル</option>
          </select>
        </div>
        <div class="form-field">
          <label>サブテーマ *</label>
          <select id="da-sub" disabled onchange="onSubChange()">
            <option value="">先にテーマを選択</option>
          </select>
        </div>
        <div class="form-field" id="subsub-row">
          <label>サブサブテーマ（ブルーのみ）</label>
          <select id="da-subsub" disabled>
            <option value="">先にサブテーマを選択</option>
          </select>
        </div>
      </div>
      <div class="form-field" style="margin-bottom:14px;">
        <label>要約（一覧・冒頭用）</label>
        <input type="text" id="da-summary" placeholder="例：生活防衛資金は月収3〜6ヶ月分を目安に" />
      </div>
      <div class="form-field" style="margin-bottom:14px;">
        <label>本文 *</label>
        <textarea id="da-body" rows="6" placeholder="学習コンテンツ本文を入力..."></textarea>
      </div>
      <div class="form-field" style="margin-bottom:14px;">
        <label>補足・背景・注意点</label>
        <textarea id="da-note" rows="3" placeholder="補足情報があれば..."></textarea>
      </div>
      <div class="form-field">
        <label>Note記事URL（任意）</label>
        <input type="url" id="da-noteurl" placeholder="https://note.com/..." />
      </div>
      <div class="form-actions">
        <button class="btn-clear" onclick="clearForm()">クリア</button>
        <button class="btn-add" id="btn-add" onclick="submitDirect()">📚 コンテンツを追加</button>
      </div>
      <div class="toast" id="toast"></div>
    </div>
  </div>

  <!-- タブ2: お預かり箱 -->
  <div id="tab-inbox" class="tab-content">
    <div id="inbox-list"><div class="loading">📮 読み込み中...</div></div>
  </div>

  <!-- タブ3: Fountain 掲示板投稿 -->
  <div id="tab-fountain-board" class="tab-content">
    <div class="direct-form">
      <h2>⛲ Fountain 噴水広場 — 掲示板に投稿</h2>
      <div class="form-field" style="margin-bottom:14px">
        <label>投稿者名</label>
        <input type="text" id="fb-author" placeholder="例：SchoolPark 運営" value="SchoolPark 運営">
      </div>
      <div class="form-field" style="margin-bottom:14px">
        <label>本文 *</label>
        <textarea id="fb-body" rows="6" placeholder="掲示板の投稿内容を入力..."></textarea>
      </div>
      <div class="form-field" style="margin-bottom:14px">
        <label>画像URL（任意）</label>
        <input type="url" id="fb-img" placeholder="https://...">
      </div>
      <div class="form-actions">
        <button class="btn-clear" onclick="document.getElementById('fb-body').value=''">クリア</button>
        <button class="btn-add" onclick="fpSubmitBoard()">⛲ 掲示板に投稿</button>
      </div>
      <div class="toast" id="fb-toast"></div>
    </div>
    <div style="margin-top:20px">
      <h2 style="font-size:14px;color:#4ec9b0;margin-bottom:12px">📋 投稿一覧</h2>
      <div id="fb-post-list" style="color:#888;font-size:13px">読み込み中…</div>
    </div>
  </div>

  <!-- タブ5: DAO投票データ -->
  <div id="tab-dao-votes" class="tab-content">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <h2 style="font-size:15px;color:#4ec9b0;margin:0">🗳️ DAO投票データ</h2>
      <button class="btn-add" onclick="loadDAOVotes()" style="padding:7px 16px;font-size:13px">🔄 再読み込み</button>
    </div>

    <!-- DAO議題作成フォーム -->
    <div style="background:#161616;border:1px solid rgba(167,139,250,0.3);border-radius:10px;padding:22px;margin-bottom:28px">
      <div style="font-size:14px;font-weight:bold;color:#a78bfa;margin-bottom:18px;display:flex;align-items:center;gap:8px">
        📝 新しいDAO議題を作成
        <span style="font-size:11px;background:rgba(251,191,36,0.1);color:#fbbf24;border:1px solid rgba(251,191,36,0.25);border-radius:10px;padding:2px 8px;">👑 運営専用</span>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">
        <div style="display:flex;flex-direction:column;gap:6px">
          <label style="font-size:12px;color:#888">議題タイトル <span style="color:#f87171">*</span></label>
          <input type="text" id="dao-new-title" maxlength="60" placeholder="例：新エリアの名前を決める"
            style="background:#0f0f0f;color:#d4d4d4;border:1px solid #333;border-radius:6px;padding:8px 10px;font-size:13px;font-family:inherit;outline:none;transition:border-color 0.2s"
            onfocus="this.style.borderColor='#a78bfa'" onblur="this.style.borderColor='#333'">
        </div>
        <div style="display:flex;flex-direction:column;gap:6px">
          <label style="font-size:12px;color:#888">期限（任意）</label>
          <input type="datetime-local" id="dao-new-deadline"
            style="background:#0f0f0f;color:#d4d4d4;border:1px solid #333;border-radius:6px;padding:8px 10px;font-size:13px;font-family:inherit;outline:none;transition:border-color 0.2s;color-scheme:dark"
            onfocus="this.style.borderColor='#a78bfa'" onblur="this.style.borderColor='#333'">
        </div>
      </div>

      <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:14px">
        <label style="font-size:12px;color:#888">説明（任意）</label>
        <textarea id="dao-new-desc" maxlength="200" rows="2" placeholder="議題の背景・詳細を記載..."
          style="background:#0f0f0f;color:#d4d4d4;border:1px solid #333;border-radius:6px;padding:8px 10px;font-size:13px;font-family:inherit;outline:none;resize:vertical;transition:border-color 0.2s"
          onfocus="this.style.borderColor='#a78bfa'" onblur="this.style.borderColor='#333'"></textarea>
      </div>

      <div style="margin-bottom:14px">
        <label style="font-size:12px;color:#888;display:block;margin-bottom:8px">選択肢（最低2つ・最大6つ） <span style="color:#f87171">*</span></label>
        <div id="dao-new-options-list" style="display:flex;flex-direction:column;gap:8px">
          <input type="text" class="dao-admin-opt" maxlength="40" placeholder="選択肢 1"
            style="background:#0f0f0f;color:#d4d4d4;border:1px solid #333;border-radius:6px;padding:7px 10px;font-size:13px;font-family:inherit;outline:none;transition:border-color 0.2s"
            onfocus="this.style.borderColor='#a78bfa'" onblur="this.style.borderColor='#333'">
          <input type="text" class="dao-admin-opt" maxlength="40" placeholder="選択肢 2"
            style="background:#0f0f0f;color:#d4d4d4;border:1px solid #333;border-radius:6px;padding:7px 10px;font-size:13px;font-family:inherit;outline:none;transition:border-color 0.2s"
            onfocus="this.style.borderColor='#a78bfa'" onblur="this.style.borderColor='#333'">
        </div>
        <button onclick="daoAdminAddOption()" style="margin-top:8px;background:rgba(167,139,250,0.1);color:#a78bfa;border:1px solid rgba(167,139,250,0.3);border-radius:6px;padding:5px 14px;font-size:12px;cursor:pointer">
          ＋ 選択肢を追加
        </button>
      </div>

      <div style="display:flex;justify-content:flex-end">
        <button onclick="daoAdminCreateTopic()"
          style="background:#a78bfa;color:#0f0f0f;border:none;border-radius:6px;padding:10px 24px;font-size:14px;font-weight:bold;cursor:pointer;transition:opacity 0.2s"
          onmouseover="this.style.opacity='0.85'" onmouseout="this.style.opacity='1'">
          🗳️ 議題を作成・公開
        </button>
      </div>
    </div>

    <!-- 既存の投票データ一覧 -->
    <div id="dao-votes-container" style="color:#888;font-size:13px">読み込み中…</div>
    <div class="toast" id="dao-toast" style="margin-top:12px"></div>
  </div>

  <!-- タブ4: Fountain イベント投稿 -->
  <div id="tab-fountain-event" class="tab-content">
    <div class="direct-form">
      <h2>🎉 Fountain 噴水広場 — イベントを追加</h2>
      <div class="form-field" style="margin-bottom:14px">
        <label>イベント名 *</label>
        <input type="text" id="fe-title" placeholder="例：SchoolPark グランドオープン記念祭">
      </div>
      <div class="form-field" style="margin-bottom:14px">
        <label>日時・場所・詳細 *</label>
        <textarea id="fe-detail" rows="5" placeholder="📅 2026年5月20日&#10;📍 Fountain 噴水広場&#10;💰 参加費：無料&#10;&#10;内容説明…"></textarea>
      </div>
      <div class="form-field" style="margin-bottom:14px">
        <label>タグ（カンマ区切り）</label>
        <input type="text" id="fe-tags" placeholder="例：EMUER配布, DAO投票, 全員参加">
      </div>
      <div class="form-field" style="margin-bottom:14px">
        <label>日付（ソート用 YYYY-MM-DD）</label>
        <input type="date" id="fe-date" style="background:#0f0f0f;color:#d4d4d4;border:1px solid #333;border-radius:6px;padding:8px 10px;font-size:13px">
      </div>
      <div class="form-actions">
        <button class="btn-clear" onclick="document.getElementById('fe-title').value='';document.getElementById('fe-detail').value=''">クリア</button>
        <button class="btn-add" onclick="fpSubmitEvent()">🎉 イベントを追加</button>
      </div>
      <div class="toast" id="fe-toast"></div>
    </div>
    <div style="margin-top:20px">
      <h2 style="font-size:14px;color:#4ec9b0;margin-bottom:12px">📋 イベント一覧</h2>
      <div id="fe-event-list" style="color:#888;font-size:13px">読み込み中…</div>
    </div>
  </div>

</div>

<script>
var API_BASE = 'https://emu-realtime.onrender.com';

var themeData = {
  money: { subs: ['増やし方','育て方','守り方','使い方','付き合い方','稼ぎ方','見極め方','回し方'] },
  net:   { subs: ['SNSとの付き合い方','炎上・トラブル対策','詐欺・フェイクの見抜き方','個人情報・セキュリティ','AIとの付き合い方','発信と責任','ネットの法律・ルール'] },
  life:  { subs: ['感情との向き合い方','交渉','家事','エチケット','セルフケア','レジリエンス','パブリック'] },
  blue:  {
    subs: {
      'リーダーシップ':   ['理念','ビジョン','戦略','変革','創造的能力','創造的態度'],
      'マネジメント':     ['目標設定','計画立案','進捗管理','目標達成','計数管理'],
      '人材活用':         ['組織運営','人材発掘・活用','業務委任','人材育成','動機付け','人的ネットワーク'],
      '意思決定':         ['決断力','解決案の提示','問題分析','情報収集','改善'],
      'ヒューマンスキル': ['状況把握','自己客観視点','チームワーク','共感力','異文化コミュニケーション','傾聴力','説得力','プレゼンテーション','企画提案力','伝達力'],
      '志向':             ['クオリティ','カスタマー','プロフィット','スペシャリティ'],
      '姿勢':             ['成長・学習意欲','柔軟な対応','主体的な行動','誠実な対応','ルール遵守','マナー意識'],
      'エネルギー':       ['信念','タフネス','ストレスコントロール','継続力']
    }
  }
};

// ─── タブ ───
const TAB_IDS = ['direct','inbox','fountain-board','fountain-event','dao-votes'];
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(function(btn, i) {
    btn.classList.toggle('active', TAB_IDS[i] === tab);
  });
  TAB_IDS.forEach(function(id) {
    var el = document.getElementById('tab-' + id);
    if (el) el.classList.toggle('active', id === tab);
  });
  if (tab === 'inbox') loadInbox();
  if (tab === 'fountain-board')  fpLoadBoardPosts();
  if (tab === 'fountain-event')  fpLoadEvents();
}

// ─── 直接追加フォーム ───
function onThemeChange() {
  var theme = document.getElementById('da-theme').value;
  var subSel = document.getElementById('da-sub');
  var subsubRow = document.getElementById('subsub-row');
  var subsubSel = document.getElementById('da-subsub');

  subSel.innerHTML = '<option value="">選択してください</option>';
  subsubSel.innerHTML = '<option value="">先にサブテーマを選択</option>';
  subsubSel.disabled = true;
  subSel.disabled = !theme;

  if (!theme) { subsubRow.style.display = 'none'; return; }

  if (theme === 'blue') {
    Object.keys(themeData.blue.subs).forEach(function(key) {
      var opt = document.createElement('option');
      opt.value = key; opt.textContent = key;
      subSel.appendChild(opt);
    });
    subsubRow.style.display = 'block';
  } else {
    themeData[theme].subs.forEach(function(s) {
      var opt = document.createElement('option');
      opt.value = s; opt.textContent = s;
      subSel.appendChild(opt);
    });
    subsubRow.style.display = 'none';
  }
}

function onSubChange() {
  var theme = document.getElementById('da-theme').value;
  var sub = document.getElementById('da-sub').value;
  var subsubSel = document.getElementById('da-subsub');
  if (theme !== 'blue' || !sub) {
    subsubSel.innerHTML = '<option value="">-</option>';
    subsubSel.disabled = true;
    return;
  }
  subsubSel.innerHTML = '<option value="">選択してください（任意）</option>';
  (themeData.blue.subs[sub] || []).forEach(function(item) {
    var opt = document.createElement('option');
    opt.value = item; opt.textContent = item;
    subsubSel.appendChild(opt);
  });
  subsubSel.disabled = false;
}

async function submitDirect() {
  var theme   = document.getElementById('da-theme').value;
  var sub     = document.getElementById('da-sub').value;
  var subsub  = document.getElementById('da-subsub').value;
  var summary = document.getElementById('da-summary').value.trim();
  var body    = document.getElementById('da-body').value.trim();
  var note    = document.getElementById('da-note').value.trim();
  var noteUrl = document.getElementById('da-noteurl').value.trim();

  if (!theme || !sub || !body) {
    showToast('テーマ・サブテーマ・本文は必須です', 'error');
    return;
  }

  var btn = document.getElementById('btn-add');
  btn.disabled = true;
  btn.textContent = '追加中...';

  try {
    var res = await fetch(API_BASE + '/api/room1/direct-add', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        theme: theme,
        subTheme: sub,
        subSubTheme: subsub || '',
        summary: summary,
        body: body,
        note: note,
        noteUrl: noteUrl
      })
    });
    if (!res.ok) throw new Error('Server error: ' + res.status);
    showToast('✅ コンテンツをRoom1に追加しました！', 'success');
    clearForm();
  } catch (err) {
    showToast('❌ 追加に失敗しました: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '📚 コンテンツを追加';
  }
}

function clearForm() {
  document.getElementById('da-theme').value = '';
  var subSel = document.getElementById('da-sub');
  subSel.innerHTML = '<option value="">先にテーマを選択</option>';
  subSel.disabled = true;
  var subsubSel = document.getElementById('da-subsub');
  subsubSel.innerHTML = '<option value="">先にサブテーマを選択</option>';
  subsubSel.disabled = true;
  document.getElementById('subsub-row').style.display = 'none';
  document.getElementById('da-summary').value = '';

// ─── お預かり箱 ───
// ★ポイント：inboxItemsをモジュールスコープに保持してidを確実に管理
var inboxItems = [];

function loadInbox() {
  document.getElementById('inbox-list').innerHTML = '<div class="loading">📮 読み込み中...</div>';

  fetch(API_BASE + '/api/room1/submissions')
    .then(function(res) {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    })
    .then(function(data) {
      // pendingのみ（サーバー側でフィルタ済みだが念のため）
      inboxItems = Array.isArray(data) ? data.filter(function(i) { return i.status === 'pending'; }) : [];
      updateInboxCount();
      renderInbox();
    })
    .catch(function(err) {
      console.error('loadInbox error:', err);
      document.getElementById('inbox-list').innerHTML =
        '<div class="empty-state">❌ データの取得に失敗しました<br><small>' + err.message + '</small></div>';
    });
}

function updateInboxCount() {
  var el = document.getElementById('inbox-count');
  el.textContent = inboxItems.length > 0 ? '(' + inboxItems.length + ')' : '';
}

var themeLabels = {
  money: 'マネーリテラシー', net: 'ネットリテラシー',
  life: 'ライフリテラシー', blue: 'ブルーファイル'
};

function renderInbox() {
  var list = document.getElementById('inbox-list');

  if (inboxItems.length === 0) {
    list.innerHTML = '<div class="empty-state">📭 未対応のお預かりはありません</div>';
    return;
  }

  // DOM要素で構築（innerHTML文字列結合ではなくDOMで構築 → onclick問題を回避）
  list.innerHTML = '';
  inboxItems.forEach(function(item, idx) {
    list.appendChild(buildInboxItem(item, idx));
  });
}

function buildInboxItem(item, idx) {
  var label = themeLabels[item.theme] || item.theme;

  var wrapper = document.createElement('div');
  wrapper.className = 'inbox-item';
  wrapper.id = 'item-wrapper-' + idx;

  // メタ
  var meta = document.createElement('div');
  meta.className = 'item-meta';
  meta.innerHTML = '<span class="tag">' + label + '</span>' +
    '<span class="tag">' + esc(item.subTheme || '') + '</span>' +
    '<span>' + new Date(item.createdAt).toLocaleString('ja-JP') + '</span>';
  wrapper.appendChild(meta);

  // 本文
  var content = document.createElement('div');
  content.className = 'item-content';
  content.textContent = item.content || '';
  wrapper.appendChild(content);

  // アクションボタン
  var actions = document.createElement('div');
  actions.className = 'item-actions';

  var approveBtn = document.createElement('button');
  approveBtn.className = 'btn-approve';
  approveBtn.textContent = '✨ 昇華';
  approveBtn.onclick = function() { openEditor(idx); };

  var rejectBtn = document.createElement('button');
  rejectBtn.className = 'btn-reject';
  rejectBtn.textContent = '見送り';
  rejectBtn.onclick = function() { rejectItem(idx); };

  actions.appendChild(approveBtn);
  actions.appendChild(rejectBtn);
  wrapper.appendChild(actions);

  // 昇華エディタ
  var editor = document.createElement('div');
  editor.className = 'editor';
  editor.id = 'editor-' + idx;

  editor.innerHTML =
    '<h4>昇華エディタ — ' + esc(label) + ' / ' + esc(item.subTheme || '') + '</h4>' +
    '<label class="editor-label">要約（一覧・冒頭用）</label>' +
    '<input type="text" id="ed-summary-' + idx + '" placeholder="要約を入力..." />' +
    '<label class="editor-label">学習コンテンツ本文</label>' +
    '<textarea id="ed-body-' + idx + '" rows="6">' + esc(item.content || '') + '</textarea>' +
    '<label class="editor-label">補足・背景・注意点</label>' +
    '<textarea id="ed-note-' + idx + '" rows="3" placeholder="補足情報..."></textarea>' +
    '<label class="editor-label">Note記事URL（任意）</label>' +
    '<input type="url" id="ed-noteurl-' + idx + '" placeholder="https://note.com/..." />';

  var edActions = document.createElement('div');
  edActions.className = 'editor-actions';

  var saveBtn = document.createElement('button');
  saveBtn.className = 'btn-approve';
  saveBtn.textContent = '✅ 昇華して反映';
  saveBtn.onclick = function() { approveItem(idx); };

  var cancelBtn = document.createElement('button');
  cancelBtn.className = 'btn-reject';
  cancelBtn.textContent = '閉じる';
  cancelBtn.onclick = function() { closeEditor(idx); };

  edActions.appendChild(saveBtn);
  edActions.appendChild(cancelBtn);
  editor.appendChild(edActions);
  wrapper.appendChild(editor);

  return wrapper;
}

function openEditor(idx) {
  // 他のエディタを全部閉じる
  document.querySelectorAll('.editor').forEach(function(e) { e.style.display = 'none'; });
  var ed = document.getElementById('editor-' + idx);
  if (ed) ed.style.display = 'block';
}

function closeEditor(idx) {
  var ed = document.getElementById('editor-' + idx);
  if (ed) ed.style.display = 'none';
}

async function approveItem(idx) {
  var item = inboxItems[idx];
  if (!item) { alert('対象が見つかりません'); return; }

  var docId = item.id; // FirestoreのドキュメントID
  var summary = document.getElementById('ed-summary-' + idx).value;
  var body    = document.getElementById('ed-body-'    + idx).value;
  var note    = document.getElementById('ed-note-'    + idx).value;
  var noteUrl = document.getElementById('ed-noteurl-' + idx).value.trim();

  if (!body.trim()) { alert('本文を入力してください'); return; }

  var saveBtn = document.querySelector('#editor-' + idx + ' .btn-approve');
  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '処理中...'; }

  try {
    var res = await fetch(API_BASE + '/api/room1/approve/' + encodeURIComponent(docId), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ summary: summary, body: body, note: note, noteUrl: noteUrl })
    });

    var result = await res.json();

    if (result.success) {
      // リストから削除して再描画
      inboxItems.splice(idx, 1);
      updateInboxCount();
      renderInbox();
      alert('✅ Room1に反映しました！');
    } else {
      alert('反映に失敗しました: ' + (result.error || '不明なエラー'));
    }
  } catch (err) {
    console.error('approveItem error:', err);
    alert('エラー: ' + err.message);
  } finally {
    if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '✅ 昇華して反映'; }
  }
}

async function rejectItem(idx) {
  var item = inboxItems[idx];
  if (!item) { alert('対象が見つかりません'); return; }

  if (!confirm('この投稿を見送りますか？')) return;

  var docId = item.id;

  try {
    var res = await fetch(API_BASE + '/api/room1/reject/' + encodeURIComponent(docId), {
      method: 'POST'
    });
    var result = await res.json();

    if (result.success) {
      inboxItems.splice(idx, 1);
      updateInboxCount();
      renderInbox();
    } else {
      alert('見送りに失敗しました: ' + (result.error || '不明なエラー'));
    }
  } catch (err) {
    console.error('rejectItem error:', err);
    alert('エラー: ' + err.message);
  }
}

function esc(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── DAO投票データ ────────────────────────────────────────
async function loadDAOVotes() {
  var container = document.getElementById('dao-votes-container');
  if (!container) return;
  if (!window.fpAdminDB) {
    container.innerHTML = '<div class="loading">🔗 Firebase接続中…</div>';
    setTimeout(loadDAOVotes, 600);
    return;
  }
  container.innerHTML = '<div class="loading">📊 投票データ読み込み中…</div>';

  try {
    var db = window.fpAdminDB;

    // ── 一般投票 (sp_fountain_votes) ──
    var generalSnap = await db.collection('sp_fountain_votes').get();
    var generalMap = {}; // { voteId: { option: [{wallet, ts}] } }
    generalSnap.forEach(function(d) {
      var data = d.data();
      var vid = data.voteId || 'unknown';
      var opt = data.option || '?';
      if (!generalMap[vid]) generalMap[vid] = {};
      if (!generalMap[vid][opt]) generalMap[vid][opt] = [];
      generalMap[vid][opt].push({ wallet: data.wallet || 'anonymous', ts: data.ts || 0 });
    });

    // ── DAO投票 (sp_fountain_dao_votes) ──
    var daoSnap = await db.collection('sp_fountain_dao_votes').get();
    var daoMap = {}; // { voteId: { option: [{wallet, ts}] } }
    daoSnap.forEach(function(d) {
      var data = d.data();
      var vid = data.voteId || 'unknown';
      var opt = data.option || '?';
      if (!daoMap[vid]) daoMap[vid] = {};
      if (!daoMap[vid][opt]) daoMap[vid][opt] = [];
      daoMap[vid][opt].push({ wallet: data.wallet || '?', ts: data.ts || 0 });
    });

    // ── 動的DAO議題 (sp_dao_votes_dynamic) ──
    var dynSnap = await db.collection('sp_dao_votes_dynamic').orderBy('ts', 'desc').limit(20).get();
    var dynTopics = [];
    dynSnap.forEach(function(d) { dynTopics.push({ id: d.id, ...d.data() }); });

    // ── 描画 ──
    var html = '';

    // 一般投票セクション
    html += '<div style="margin-bottom:28px">';
    html += '<div style="font-size:14px;font-weight:bold;color:#4ec9b0;border-bottom:1px solid #2a2a2a;padding-bottom:8px;margin-bottom:12px">🟢 一般投票（sp_fountain_votes）</div>';
    var generalVoteIds = Object.keys(generalMap);
    if (generalVoteIds.length === 0) {
      html += '<div style="color:#555;font-size:13px">投票データなし</div>';
    } else {
      generalVoteIds.sort().forEach(function(vid) {
        var optMap = generalMap[vid];
        var totalVotes = Object.values(optMap).reduce(function(s,v){ return s+v.length; }, 0);
        html += daoRenderVoteCard(vid, optMap, totalVotes, false);
      });
    }
    html += '</div>';

    // DAO投票（固定）セクション
    html += '<div style="margin-bottom:28px">';
    html += '<div style="font-size:14px;font-weight:bold;color:#fbbf24;border-bottom:1px solid #2a2a2a;padding-bottom:8px;margin-bottom:12px">👑 DAO投票 固定議題（sp_fountain_dao_votes）</div>';
    var fixedVoteIds = Object.keys(daoMap).filter(function(v){ return !v.startsWith('dyn_'); });
    if (fixedVoteIds.length === 0) {
      html += '<div style="color:#555;font-size:13px">投票データなし</div>';
    } else {
      fixedVoteIds.sort().forEach(function(vid) {
        var optMap = daoMap[vid];
        var totalVotes = Object.values(optMap).reduce(function(s,v){ return s+v.length; }, 0);
        html += daoRenderVoteCard(vid, optMap, totalVotes, true);
      });
    }
    html += '</div>';

    // DAO投票（動的議題）セクション
    html += '<div style="margin-bottom:28px">';
    html += '<div style="font-size:14px;font-weight:bold;color:#a78bfa;border-bottom:1px solid #2a2a2a;padding-bottom:8px;margin-bottom:12px">🏛️ DAO投票 動的議題（sp_dao_votes_dynamic）</div>';
    if (dynTopics.length === 0) {
      html += '<div style="color:#555;font-size:13px">議題なし</div>';
    } else {
      dynTopics.forEach(function(topic) {
        var dynVoteId = 'dyn_' + topic.id;
        var optMap = daoMap[dynVoteId] || {};
        var totalVotes = Object.values(optMap).reduce(function(s,v){ return s+v.length; }, 0);
        var deadline = topic.deadline ? new Date(topic.deadline).toLocaleString('ja-JP') : '期限なし';
        var createdAt = topic.ts ? new Date(topic.ts).toLocaleString('ja-JP') : '';
        html += '<div style="background:#161616;border:1px solid #2a2a2a;border-radius:8px;padding:16px;margin-bottom:12px">';
        html += '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px">';
        html += '<div style="flex:1;min-width:0">';
        html += '<div style="font-weight:bold;font-size:14px;margin-bottom:3px">' + esc(topic.title || '（タイトルなし）') + '</div>';
        html += '<div style="font-size:11px;color:#666">作成: ' + createdAt + ' / 期限: ' + deadline + ' / 提案者: ' + esc((topic.creator||'').substring(0,10)+'…') + '</div>';
        html += '</div>';
        html += '<div style="display:flex;gap:8px;align-items:center;flex-shrink:0">';
        html += '<div style="background:#1e1e1e;border:1px solid #333;border-radius:6px;padding:4px 10px;font-size:13px;font-weight:bold;color:#a78bfa;white-space:nowrap">👥 ' + totalVotes + '票</div>';
        html += '<button onclick="daoDeleteTopic(\'' + topic.id + '\',\'' + esc(topic.title||'').replace(/'/g,"\\'") + '\')" style="background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);color:#f87171;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:bold;cursor:pointer;white-space:nowrap;transition:background 0.15s" onmouseover="this.style.background=\'rgba(239,68,68,0.22)\'" onmouseout="this.style.background=\'rgba(239,68,68,0.12)\'">🗑️ 削除</button>';
        html += '</div>';
        html += '</div>';
        if (Object.keys(optMap).length > 0) {
          html += daoRenderOptionBars(optMap, totalVotes, true);
        } else {
          html += '<div style="font-size:12px;color:#555">まだ投票なし</div>';
        }
        html += '</div>';
      });
    }
    html += '</div>';

    container.innerHTML = html;

  } catch(e) {
    console.error('loadDAOVotes error:', e);
    container.innerHTML = '<div class="empty-state">❌ 読み込みに失敗しました<br><small>' + esc(e.message) + '</small></div>';
  }
}

// ─── DAO議題削除 ──────────────────────────────────────────
async function daoDeleteTopic(docId, title) {
  var displayTitle = title || docId;
  if (!confirm('議題「' + displayTitle + '」を削除しますか？\n\nこの操作は元に戻せません。\n※投票済みデータ（sp_fountain_dao_votes の dyn_xxx 集計）は残ります。')) return;

  var db = window.fpAdminDB;
  if (!db) {
    fpShowToast('dao-toast', '🔗 Firebase未接続です', 'error');
    return;
  }
  try {
    await db.collection('sp_dao_votes_dynamic').doc(docId).delete();
    fpShowToast('dao-toast', '✅ 議題「' + displayTitle + '」を削除しました', 'success');
    loadDAOVotes();
  } catch(e) {
    fpShowToast('dao-toast', '❌ 削除に失敗しました: ' + e.message, 'error');
  }
}

function daoRenderVoteCard(voteId, optMap, totalVotes, isDAO) {
  var color = isDAO ? '#fbbf24' : '#4ec9b0';
  var html = '<div style="background:#161616;border:1px solid #2a2a2a;border-radius:8px;padding:16px;margin-bottom:12px">';
  html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">';
  html += '<div style="font-weight:bold;font-size:14px;color:' + color + '">' + esc(voteId) + '</div>';
  html += '<div style="background:#1e1e1e;border:1px solid #333;border-radius:6px;padding:4px 10px;font-size:13px;font-weight:bold;color:' + color + '">👥 ' + totalVotes + '票</div>';
  html += '</div>';
  html += daoRenderOptionBars(optMap, totalVotes, isDAO);
  html += '</div>';
  return html;
}

function daoRenderOptionBars(optMap, totalVotes, showVoters) {
  var html = '';
  var sortedOpts = Object.keys(optMap).sort(function(a,b){
    return optMap[b].length - optMap[a].length;
  });
  sortedOpts.forEach(function(opt) {
    var voters = optMap[opt];
    var cnt = voters.length;
    var pct = totalVotes > 0 ? Math.round(cnt / totalVotes * 100) : 0;
    html += '<div style="margin-bottom:8px">';
    html += '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">';
    html += '<span>' + esc(opt) + '</span>';
    html += '<span style="color:#888">' + cnt + '票 (' + pct + '%)</span>';
    html += '</div>';
    html += '<div style="background:#0f0f0f;border-radius:4px;height:6px;overflow:hidden">';
    html += '<div style="height:100%;background:linear-gradient(90deg,#4ec9b0,#22d3ee);width:' + pct + '%;transition:width 0.4s"></div>';
    html += '</div>';
    if (showVoters && voters.length > 0) {
      html += '<div style="margin-top:4px;display:flex;flex-wrap:wrap;gap:4px">';
      voters.slice(0,8).forEach(function(v) {
        var addr = v.wallet || 'anon';
        var short = addr === 'anonymous' ? 'anon' : (addr.length > 12 ? addr.substring(0,6)+'…'+addr.slice(-4) : addr);
        var dt = v.ts ? new Date(v.ts).toLocaleDateString('ja-JP') : '';
        html += '<span title="' + esc(addr) + '  ' + dt + '" style="background:#1e1e1e;border:1px solid #333;border-radius:3px;padding:1px 6px;font-size:10px;color:#888;cursor:default">' + esc(short) + '</span>';
      });
      if (voters.length > 8) {
        html += '<span style="font-size:10px;color:#555">…他' + (voters.length-8) + '人</span>';
      }
      html += '</div>';
    }
    html += '</div>';
  });
  return html;
}

async function deleteAllContents() {
  if (!confirm('room1の学習コンテンツをすべて削除します。\nこの操作は取り消せません。本当に実行しますか？')) return;
  try {
    var res = await fetch(API_BASE + '/api/room1/contents/all', { method: 'DELETE' });
    var result = await res.json();
    if (result.success) {
      alert('✅ ' + result.deleted + '件のコンテンツを削除しました。');
    } else {
      alert('❌ 削除に失敗しました: ' + (result.error || '不明なエラー'));
    }
  } catch (err) {
    alert('❌ エラー: ' + err.message);
  }
}
