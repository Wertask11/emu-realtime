<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>Emu | Room1 - 学び</title>
<style>
body.dark {
  --bg-main: #1E1E1E; --bg-header: #252526; --bg-card: #2A2A2A;
  --bg-card-hover: #333333; --border: #3C3C3C; --text-main: #D4D4D4;
  --text-sub: #AFAFAF; --accent: #569CD6; --accent-green: #4EC9B0;
}
body.light {
  --bg-main: #F5F5F5; --bg-header: #FFFFFF; --bg-card: #FFFFFF;
  --bg-card-hover: #F0F0F0; --border: #DDDDDD; --text-main: #2C2C2C;
  --text-sub: #555555; --accent: #3A6EA5; --accent-green: #1e8a5a;
}
body {
  margin: 0; background: var(--bg-main); color: var(--text-main);
  font-family: system-ui, sans-serif;
}
header {
  padding: 16px; border-bottom: 1px solid var(--border);
  background: var(--bg-header); display: flex;
  justify-content: space-between; align-items: center;
}
header h1 { margin: 0; font-size: 18px; }
.header-actions { display: flex; align-items: center; gap: 10px; }
.header-btn {
  cursor: pointer; font-size: 13px; color: var(--accent);
  border: 1px solid var(--border); padding: 6px 10px;
  border-radius: 6px; background: transparent;
}
.header-btn:hover { opacity: 0.85; }
#container { padding: 24px; }
.section-title { margin-bottom: 16px; font-size: 16px; color: var(--text-sub); }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
.card {
  background: var(--bg-card); border: 1px solid var(--border);
  padding: 20px; cursor: pointer; transition: 0.2s; border-radius: 6px;
}
.card:hover { background: var(--bg-card-hover); }
.card h2 { margin: 0 0 8px; font-size: 16px; }
.card p { margin: 0; font-size: 13px; color: var(--text-sub); }
.back-btn { margin-bottom: 16px; cursor: pointer; color: var(--accent); font-size: 14px; }
.mode-btns { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
ul.sub-list { list-style: disc; padding-left: 20px; }
ul.sub-list li { margin-bottom: 10px; cursor: pointer; color: var(--accent); }
ul.sub-list li:hover { text-decoration: underline; }
#detailList .card { margin-bottom: 14px; }

/* お預かり箱 */
.deposit-wrapper { margin-top: 48px; border-top: 1px solid var(--border); padding-top: 32px; }
.deposit-toggle {
  cursor: pointer; color: var(--accent); border: 1px solid var(--accent);
  padding: 12px 16px; border-radius: 6px; background: transparent; font-size: 14px;
}
.deposit-box { display: none; margin-top: 24px; }
.deposit-box textarea, .deposit-box select {
  width: 100%; margin-top: 12px; padding: 10px;
  background: var(--bg-card); color: var(--text-main);
  border: 1px solid var(--border); border-radius: 6px;
  font-family: inherit; box-sizing: border-box;
}
.deposit-box button {
  margin-top: 16px; padding: 10px 16px; background: transparent;
  color: var(--accent); border: 1px solid var(--accent);
  border-radius: 6px; cursor: pointer;
}

/* リフレッシュ中インジケーター */
#refresh-indicator {
  display: none; position: fixed; bottom: 16px; right: 16px;
  background: var(--accent-green); color: #fff;
  padding: 8px 14px; border-radius: 20px; font-size: 12px;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>

<body class="dark">
<div id="refresh-indicator">🔄 更新中...</div>

<header>
  <h1 id="headerTitle">Room1｜マネーリテラシー</h1>
  <div class="header-actions">
    <button id="backToEmuBtn" class="header-btn" onclick="parent.closeRoom1()">← Emu</button>
    <button class="header-btn" onclick="toggleTheme()">🌗</button>
  </div>
</header>

<div id="container">
  <div class="mode-btns">
    <div class="card" onclick="switchMode('money')">マネーリテラシー</div>
    <div class="card" onclick="switchMode('net')">ネットリテラシー</div>
    <div class="card" onclick="switchMode('life')">ライフリテラシー</div>
    <div class="card" onclick="switchMode('blue')">ブルーファイル</div>
  </div>

  <div id="list"></div>

  <div id="sub" style="display:none;">
    <div class="back-btn" onclick="backToList()">← 戻る</div>
    <h2 id="subTitle"></h2>
    <ul class="sub-list" id="subList"></ul>
  </div>

  <div id="detail" style="display:none;">
    <div class="back-btn" onclick="backToSub()">← 戻る</div>
    <h2 id="detailTitle"></h2>
    <div id="detailList"></div>
    <div id="detailBody"></div>
  </div>

  <!-- お預かり箱（ユーザー送信用） -->
  <div class="deposit-wrapper">
    <button class="deposit-toggle" onclick="toggleDeposit()">📮 お預かり箱</button>
    <div class="deposit-box" id="depositBox">
      <p style="font-size:13px; color:var(--text-sub); line-height:1.6;">
        マネー・ネット・ライフ・ブルーファイルに関する気づきや疑問、体験をお預かりします。<br>
        価値のあるものは学習コンテンツとして反映されます。
      </p>
      <select id="depositTheme" onchange="onDepositThemeChange()">
        <option value="">テーマを選択</option>
        <option value="money">マネーリテラシー</option>
        <option value="net">ネットリテラシー</option>
        <option value="life">ライフリテラシー</option>
        <option value="blue">ブルーファイル</option>
      </select>
      <select id="depositSubTheme" disabled>
        <option value="">サブテーマを選択</option>
      </select>
      <textarea id="depositContent" rows="4" placeholder="ここに内容を書いてください"></textarea>
      <button onclick="submitDeposit()">預ける</button>
    </div>
  </div>
</div>

<script>
const API_BASE = "https://emu-realtime.onrender.com";

const themeData = {
  money: {
    title: "Room1｜マネーリテラシー",
    items: [
      ["増やし方","資産・収入をどう増やすか"],["育て方","時間を味方につける考え方"],
      ["守り方","失わない・騙されない"],["使い方","価値ある支出とは何か"],
      ["付き合い方","感情・幸福・距離感"],["稼ぎ方","労働・スキル・仕組み"],
      ["見極め方","情報・人・話の真偽"],["回し方","流れを止めない設計"]
    ]
  },
  net: {
    title: "Room1｜ネットリテラシー",
    items: [
      ["SNSとの付き合い方","距離感と健全な使い方"],["炎上・トラブル対策","守る・避ける・対処する"],
      ["詐欺・フェイクの見抜き方","疑う力を持つ"],["個人情報・セキュリティ","守るべき境界線"],
      ["AIとの付き合い方","使う側でいるために"],["発信と責任","言葉の影響力"],
      ["ネットの法律・ルール","知らないと損する知識"]
    ]
  },
  life: {
    title: "Room1｜ライフリテラシー",
    items: [
      ["感情との向き合い方","自分を理解する力"],["交渉","対話で前に進める技術"],
      ["家事","生活を回す基本スキル"],["エチケット","人との距離感と礼節"],
      ["セルフケア","自分を守り整える"],["レジリエンス","折れない・立ち直る力"],
      ["パブリック","社会との関わり方"]
    ]
  },
  blue: {
    title: "Room1｜ブルーファイル",
    mains: {
      "リーダーシップ":   ["理念","ビジョン","戦略","変革","創造的能力","創造的態度"],
      "マネジメント":     ["目標設定","計画立案","進捗管理","目標達成","計数管理"],
      "人材活用":         ["組織運営","人材発掘・活用","業務委任","人材育成","動機付け","人的ネットワーク"],
      "意思決定":         ["決断力","解決案の提示","問題分析","情報収集","改善"],
      "ヒューマンスキル": ["状況把握","自己客観視点","チームワーク","共感力","異文化コミュニケーション","傾聴力","説得力","プレゼンテーション","企画提案力","伝達力"],
      "志向":             ["クオリティ","カスタマー","プロフィット","スペシャリティ"],
      "姿勢":             ["成長・学習意欲","柔軟な対応","主体的な行動","誠実な対応","ルール遵守","マナー意識"],
      "エネルギー":       ["信念","タフネス","ストレスコントロール","継続力"]
    }
  }
};

let currentMode = "money";
let currentBlueMain = "";
let currentHits = [];
let viewState = "list";
let room1Contents = [];
// 現在の詳細表示の文脈を保持（再読込後に再描画するため）
let currentDetailKey = { title: "", blueMain: "" };

// ══════════════════════════════════
// コンテンツ読み込み（Firestoreから）
// ══════════════════════════════════
async function loadContents(silent = false) {
  if (!silent) {
    const ind = document.getElementById("refresh-indicator");
    if (ind) { ind.style.display = "block"; setTimeout(() => ind.style.display = "none", 1500); }
  }
  try {
    const res = await fetch(`${API_BASE}/api/room1/contents`);
    const data = await res.json();
    room1Contents = Array.isArray(data) ? data : [];
    console.log(`📚 Room1コンテンツ読み込み: ${room1Contents.length}件`);
  } catch (e) {
    console.error("contents load error", e);
    room1Contents = [];
  }
}

// 管理画面から「追加完了」のメッセージを受け取る
window.addEventListener("message", async (event) => {
  if (event.data && event.data.type === "room1_content_added") {
    console.log("📨 管理画面から追加通知を受信 → 再読み込み");
    await loadContents(true);
    // 現在詳細ビューを開いているなら再描画
    if (document.getElementById("detail").style.display === "block" && currentDetailKey.title) {
      openDetail(currentDetailKey.title, currentDetailKey.blueMain);
    }
  }
});

// ──────────────────────────
// 初期化
// ──────────────────────────
window.addEventListener("load", async () => {
  await loadContents(true);
  renderList();

  // 5分ごとにサイレント更新（ページ開きっぱなしでも最新を取得）
  setInterval(() => loadContents(true), 5 * 60 * 1000);
});

// ══════════════════════════════════
// UI
// ══════════════════════════════════
function toggleTheme() {
  document.body.classList.toggle("dark");
  document.body.classList.toggle("light");
}

function switchMode(mode) {
  currentMode = mode;
  currentBlueMain = "";
  renderList();
}

function renderList() {
  const list = document.getElementById("list");
  document.getElementById("sub").style.display = "none";
  document.getElementById("detail").style.display = "none";

  if (currentMode !== "blue") {
    list.innerHTML = `
      <div class="section-title">どれを磨く？</div>
      <div class="grid">
        ${themeData[currentMode].items.map(i =>
          `<div class="card" onclick="openDetail('${escJs(i[0])}')"><h2>${i[0]}</h2><p>${i[1]}</p></div>`
        ).join("")}
      </div>`;
  } else {
    list.innerHTML = `
      <div class="section-title">どれを磨く？</div>
      <div class="grid">
        ${Object.keys(themeData.blue.mains).map(m =>
          `<div class="card" onclick="openBlueMain('${escJs(m)}')"><h2>${m}</h2></div>`
        ).join("")}
      </div>`;
  }
  document.getElementById("headerTitle").textContent = themeData[currentMode].title;
  list.style.display = "block";
}

function openBlueMain(main) {
  currentBlueMain = main;
  document.getElementById("list").style.display = "none";
  document.getElementById("detail").style.display = "none";
  document.getElementById("sub").style.display = "block";
  document.getElementById("subTitle").textContent = main;
  document.getElementById("subList").innerHTML =
    themeData.blue.mains[main].map(s =>
      `<li onclick="openDetail('${escJs(s)}', '${escJs(main)}')">${s}</li>`
    ).join("");
}

function openDetail(title, blueMain) {
  viewState = "list";
  currentDetailKey = { title, blueMain: blueMain || "" };

  document.getElementById("list").style.display = "none";
  document.getElementById("sub").style.display = "none";
  document.getElementById("detail").style.display = "block";
  document.getElementById("detailTitle").textContent = title;

  // ブルーファイルはサブサブテーマで絞り込み
  if (currentMode === "blue" && blueMain) {
    currentHits = room1Contents.filter(c =>
      (c.theme === "blue") && (c.subTheme === blueMain) && (c.subSubTheme === title) && typeof c.body === "string"
    );
  } else {
    currentHits = room1Contents.filter(c =>
      c.subTheme === title && typeof c.body === "string"
    );
  }

  if (currentHits.length === 0) {
    document.getElementById("detailList").innerHTML =
      "<p style='color:var(--text-sub);font-size:13px;'>このテーマは現在準備中です。</p>";
    document.getElementById("detailBody").innerHTML = "";
    return;
  }
  renderHitList();
}

function renderHitList() {
  document.getElementById("detailList").innerHTML = currentHits.map((h, i) => `
    <div class="card" onclick="openPost(${i})">
      <strong>📘 ${h.summary || "学習コンテンツ"}</strong>
      ${h.body ? `<p style="font-size:13px;color:var(--text-sub);margin-top:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${h.body}</p>` : ""}
      <span style="font-size:11px;color:var(--text-sub);">${new Date(h.createdAt).toLocaleString()}</span>
    </div>
  `).join("");
  document.getElementById("detailBody").innerHTML = "";
}

function openPost(index) {
  viewState = "post";
  const post = currentHits[index];
  if (!post) return;
  document.getElementById("detailTitle").textContent =
    [post.theme, post.subTheme, post.subSubTheme].filter(Boolean).join("｜");
  document.getElementById("detailList").innerHTML = "";
  document.getElementById("detailBody").innerHTML = `
    <div style="line-height:1.9;margin-bottom:24px;">
      <strong>📝 要約</strong><br>${post.summary ? post.summary.replace(/\n/g,"<br>") : "—"}
    </div>
    <div style="line-height:1.9;margin-bottom:32px;">
      <strong>📘 本文</strong><br>${post.body.replace(/\n/g,"<br>")}
    </div>
    ${post.note ? `<div style="border-top:1px dashed var(--border);padding-top:16px;color:var(--text-sub);font-size:13px;">⚠ 補足・注意<br>${post.note.replace(/\n/g,"<br>")}</div>` : ""}
  `;
}

function backToList() { currentBlueMain = ""; renderList(); }

function backToSub() {
  if (viewState === "post") { viewState = "list"; renderHitList(); return; }
  if (currentMode !== "blue" || !currentBlueMain) { renderList(); return; }
  openBlueMain(currentBlueMain);
}

function escJs(s) { return String(s).replace(/'/g, "\\'"); }

// ══════════════════════════════════
// お預かり箱（ユーザー送信）
// ══════════════════════════════════
function toggleDeposit() {
  const box = document.getElementById("depositBox");
  box.style.display = box.style.display === "block" ? "none" : "block";
}

function onDepositThemeChange() {
  const theme = document.getElementById("depositTheme").value;
  const subSel = document.getElementById("depositSubTheme");
  subSel.innerHTML = "<option value=''>サブテーマを選択</option>";
  subSel.disabled = !theme;
  if (!theme) return;

  if (theme === "blue") {
    Object.keys(themeData.blue.mains).forEach(m => {
      const opt = document.createElement("option");
      opt.value = m; opt.textContent = m; subSel.appendChild(opt);
    });
  } else {
    themeData[theme].items.forEach(item => {
      const opt = document.createElement("option");
      opt.value = item[0]; opt.textContent = item[0]; subSel.appendChild(opt);
    });
  }
}

function submitDeposit() {
  const theme   = document.getElementById("depositTheme").value;
  const subTheme = document.getElementById("depositSubTheme").value;
  const content = document.getElementById("depositContent").value.trim();

  if (!theme || !subTheme || !content) { alert("テーマ・サブテーマ・内容を入力してください"); return; }

  fetch(`${API_BASE}/api/room1/submit`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ theme, subTheme, content })
  })
  .then(res => res.json())
  .then(() => {
    alert("📮 お預かりしました！");
    document.getElementById("depositContent").value = "";
    document.getElementById("depositTheme").value = "";
    document.getElementById("depositSubTheme").innerHTML = "<option value=''>サブテーマを選択</option>";
    document.getElementById("depositSubTheme").disabled = true;
    document.getElementById("depositBox").style.display = "none";
  });
}
</script>
</body>
</html>
