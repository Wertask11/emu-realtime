// ── ユーティリティ ──
function toKatakana(s) {
  return s
    .replace(/[\u3041-\u3096]/g, c => String.fromCharCode(c.charCodeAt(0) + 0x60))
    .replace(/\u3099/g, "\u309B")
    .replace(/\u309A/g, "\u309C");
}
function normalize(s) {
  return toKatakana(s.trim().replace(/\u200B|\uFEFF|\u00A0/g, ""));
}

// ── ドラッグ&ドロップ パスワードビルダー ──
function PasswordBuilder({ collected, slots, onDrop, onRemove, color: c, active }) {
  const [dragState, setDragState] = useState(null);
  const ghostRef = useRef(null);

  useEffect(() => {
    const el = document.createElement("div");
    // ★ pointer-events:none が核心 — ghost表示中でもelementFromPointが透過する
    el.style.cssText = "display:none;position:fixed;width:58px;height:58px;border-radius:14px;align-items:center;justify-content:center;font-size:26px;font-weight:700;font-family:'Noto Sans JP',sans-serif;z-index:9000;pointer-events:none;transform:translate(-50%,-50%);";
    document.body.appendChild(el);
    ghostRef.current = el;
    return () => el.remove();
  }, []);

  // ★ ghost が pointer-events:none なので一時非表示が不要
  const getSlotAt = (x, y) => {
    const el = document.elementFromPoint(x, y);
    const s = el?.closest("[data-pw-slot]");
    return s ? parseInt(s.dataset.pwSlot) : null;
  };

  const beginDrag = (srcType, srcIdx, char, x, y) => {
    if (!active || !char) return;
    const g = ghostRef.current;
    if (g) {
      g.textContent = char;
      g.style.cssText = `display:flex;position:fixed;width:58px;height:58px;border-radius:14px;align-items:center;justify-content:center;font-size:26px;font-weight:700;font-family:'Noto Sans JP',sans-serif;z-index:9000;pointer-events:none;transform:translate(-50%,-50%);background:linear-gradient(135deg,${c.p},${c.a});color:#fff;box-shadow:0 8px 32px ${c.g};left:${x}px;top:${y}px;`;
    }
    setDragState({ srcType, srcIdx, char, overSlot: null });
  };

  useEffect(() => {
    if (!dragState) return;
    const onMove = (x, y) => {
      const g = ghostRef.current;
      if (g) { g.style.left = x + "px"; g.style.top = y + "px"; }
      const over = getSlotAt(x, y);
      if (over !== dragState.overSlot) {
        setDragState(prev => prev ? { ...prev, overSlot: over } : null);
      }
    };
    const onEnd = (x, y) => {
      // ★ スロット検出 → ghost非表示 の順（逆にすると文字が消えるバグが発生）
      const slotIdx = getSlotAt(x, y);
      const g = ghostRef.current;
      if (g) g.style.display = "none";
      if (slotIdx !== null) onDrop(dragState.srcType, dragState.srcIdx, dragState.char, slotIdx);
      setDragState(null);
    };
    const onMouseMove = e => onMove(e.clientX, e.clientY);
    const onMouseUp   = e => onEnd(e.clientX, e.clientY);
    const onTouchMove = e => { if (e.cancelable) e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY); };
    const onTouchEnd  = e => { if (e.cancelable) e.preventDefault(); onEnd(e.changedTouches[0].clientX, e.changedTouches[0].clientY); };
    const onCancel    = () => { const g = ghostRef.current; if (g) g.style.display = "none"; setDragState(null); };
    window.addEventListener("mousemove",  onMouseMove);
    window.addEventListener("mouseup",    onMouseUp);
    window.addEventListener("touchmove",  onTouchMove, { passive: false });
    window.addEventListener("touchend",   onTouchEnd,  { passive: false });
    window.addEventListener("touchcancel",onCancel);
    return () => {
      window.removeEventListener("mousemove",  onMouseMove);
      window.removeEventListener("mouseup",    onMouseUp);
      window.removeEventListener("touchmove",  onTouchMove);
      window.removeEventListener("touchend",   onTouchEnd);
      window.removeEventListener("touchcancel",onCancel);
    };
  }, [dragState, onDrop, c]);

  const usedChars = [...slots.filter(Boolean)];
  const trayChars = collected.map(ch => {
    const i = usedChars.indexOf(ch);
    if (i !== -1) { usedChars.splice(i, 1); return null; }
    return ch;
  });

  return (
    <div>
      <div style={{fontSize:11,color:"rgba(255,255,255,0.38)",marginBottom:7,letterSpacing:"0.05em"}}>📦 集めた文字（ドラッグ / スワイプで下へ）</div>
      <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap",minHeight:64,padding:"8px 6px",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:13,marginBottom:14}}>
        {trayChars.map((ch, i) => {
          const isDragging = dragState?.srcType === "tray" && dragState?.srcIdx === i;
          return ch === null
            ? <div key={i} style={{width:56,height:56,borderRadius:13,background:"rgba(255,255,255,0.02)",border:"2px dashed rgba(255,255,255,0.06)",flexShrink:0}}/>
            : <div key={i}
                style={{width:56,height:56,borderRadius:13,background:`linear-gradient(135deg,${c.bg},rgba(255,255,255,0.03))`,border:`2px solid ${c.p}80`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,fontWeight:700,color:c.a,cursor:active?"grab":"default",userSelect:"none",WebkitUserSelect:"none",touchAction:"none",flexShrink:0,boxShadow:`0 4px 16px ${c.g}`,opacity:isDragging?0.3:1,transition:"opacity 0.1s"}}
                onMouseDown={e => { e.preventDefault(); beginDrag("tray", i, ch, e.clientX, e.clientY); }}
                onTouchStart={e => { e.preventDefault(); beginDrag("tray", i, ch, e.touches[0].clientX, e.touches[0].clientY); }}
              >{ch}</div>;
        })}
      </div>
      <div style={{fontSize:11,color:"rgba(255,255,255,0.38)",marginBottom:7,letterSpacing:"0.05em"}}>🔑 パスワード欄（タップで戻せます）</div>
      <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap",marginBottom:12,minHeight:70,alignItems:"center"}}>
        {slots.map((ch, i) => {
          const isOver = dragState?.overSlot === i && !ch;
          const isDragging = dragState?.srcType === "slot" && dragState?.srcIdx === i;
          return (
            <div key={i} data-pw-slot={i}
              style={{width:56,height:62,borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",fontSize:23,fontWeight:700,background:ch?`linear-gradient(135deg,${c.bg},rgba(255,255,255,0.04))`:isOver?`${c.bg}aa`:"rgba(255,255,255,0.05)",border:`${ch?"2px solid":"2.5px dashed"} ${ch?c.p:isOver?c.p:"rgba(255,255,255,0.22)"}`,color:ch?c.a:isOver?c.p:"rgba(255,255,255,0.2)",boxShadow:ch?`0 0 16px ${c.g}`:isOver?`0 0 24px ${c.g}`:"none",transform:isOver?"scale(1.12)":ch?"scale(1.04)":"scale(1)",transition:"all 0.15s cubic-bezier(0.34,1.56,0.64,1)",position:"relative",flexShrink:0,opacity:isDragging?0.3:1,cursor:ch&&active?"grab":"default",userSelect:"none",WebkitUserSelect:"none",touchAction:"none"}}
              onClick={() => active && ch && onRemove(i)}
              onMouseDown={ch&&active?e=>{e.preventDefault();beginDrag("slot",i,ch,e.clientX,e.clientY);}:undefined}
              onTouchStart={ch&&active?e=>{e.preventDefault();beginDrag("slot",i,ch,e.touches[0].clientX,e.touches[0].clientY);}:undefined}
            >
              {ch||""}
              {ch&&active&&<div style={{position:"absolute",top:-7,right:-7,width:19,height:19,borderRadius:"50%",background:"rgba(240,60,60,0.9)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#fff",pointerEvents:"none"}}>✕</div>}
            </div>
          );
        })}
      </div>
      {active&&<p style={{textAlign:"center",fontSize:11,color:"rgba(255,255,255,0.25)",lineHeight:1.5}}>✕タップ または ドラッグでトレイに戻せます</p>}
    </div>
  );
}

// ── ゲーム本体 ──
function DoorGame({ door, onClear, onBack }) {
  const c = door.col;
  const total = door.answer.length;
  const [phase, setPhase] = useState("collect");
  const [collected, setCollected] = useState([]);
  const [slots, setSlots] = useState(Array(total).fill(null));
  const [postText, setPostText] = useState("");
  const [postMode, setPostMode] = useState("free");
  const [isPosting, setIsPosting] = useState(false);
  const [postLog, setPostLog] = useState([]);
  const [newCharIdx, setNewCharIdx] = useState(-1);
  const [particles, setParticles] = useState([]);
  const [showReward, setShowReward] = useState(false);
  const [errorMsg, setErrorMsg] = useState("");
  const [currentTheme] = useState(THEMES[Math.floor(Math.random() * THEMES.length)]);

  const isCollectDone = collected.length >= total;
  const doorOpen = phase === "open" || phase === "done";
  const pwFull = !slots.some(s => !s);

  const handleDrop = useCallback((srcType, srcIdx, char, slotIdx) => {
    setSlots(prev => {
      const next = [...prev];
      if (srcType === "slot") next[srcIdx] = null;
      next[slotIdx] = char;
      return next;
    });
    setErrorMsg("");
  }, []);

  const handleRemove = useCallback((i) => {
    setSlots(prev => { const n = [...prev]; n[i] = null; return n; });
  }, []);

  const handlePost = useCallback(async () => {
    if (isCollectDone || isPosting) return;
    if (postText.trim().length === 0) return;
    setIsPosting(true);
    await new Promise(r => setTimeout(r, 700));
    const idx = collected.length, char = door.chars[idx];
    const newCol = [...collected, char];
    setNewCharIdx(idx); setCollected(newCol);
    setPostLog(l => [{ id:idx+1, text:postText.trim().slice(0,24), char, time:new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"}) }, ...l]);
    setPostText(""); setIsPosting(false);
    setTimeout(() => setNewCharIdx(-1), 1800);
    if (newCol.length >= total) setTimeout(() => setPhase("arrange"), 600);
  }, [isCollectDone, isPosting, postText, collected, door, total]);

  const handleUnlock = () => {
    if (!pwFull) { setErrorMsg("全てのマスを埋めてください"); return; }
    const entered = normalize(slots.join(""));
    const answer  = normalize(door.answer);
    if (entered === answer) {
      setErrorMsg(""); setPhase("unlocking");
      setParticles(Array.from({length:42},(_,i)=>({id:i,angle:(i/42)*360+Math.random()*10,dist:80+Math.random()*160,color:["#FFD700",c.p,c.a,"#FF6B9D","#67E8F9","#86EFAC"][i%6],size:5+Math.random()*10,delay:Math.random()*0.5})));
      setTimeout(() => setPhase("open"), 1100);
      setTimeout(async () => { setPhase("done"); setShowReward(true); await onClear(door.id); }, 2800);
    } else {
      setErrorMsg("パスワードが違います。並べ直してみよう！");
      const el = document.getElementById("hd-door");
      if (el) { el.style.animation="hdShake 0.5s ease"; setTimeout(()=>el.style.animation="",600); }
    }
  };

  const postBtnStyle = {
    width:"100%",padding:12,border:"none",borderRadius:13,fontSize:13,fontWeight:700,fontFamily:"inherit",letterSpacing:"0.04em",transition:"all 0.3s",cursor:"pointer",
    background:postText.trim().length>0&&!isPosting?`linear-gradient(135deg,#5B20EF,${c.p})`:"rgba(255,255,255,0.08)",
    color:postText.trim().length>0&&!isPosting?"#fff":"rgba(255,255,255,0.45)",
    boxShadow:postText.trim().length>0&&!isPosting?`0 4px 22px rgba(91,32,239,0.4)`:"none",
  };

  return (
    <>
      <div style={{position:"fixed",top:"44%",left:"50%",zIndex:200,pointerEvents:"none"}}>
        {particles.map(p=>{const rad=p.angle*Math.PI/180;return<div key={p.id} style={{position:"absolute",borderRadius:"50%",width:p.size,height:p.size,background:p.color,boxShadow:`0 0 8px ${p.color}`,"--tx":`${Math.cos(rad)*p.dist}px`,"--ty":`${Math.sin(rad)*p.dist-90}px`,animationDelay:`${p.delay}s`,animation:"hdPfly 1.5s ease-out both"}}/>;
        })}
      </div>

      <button onClick={onBack} style={{background:"transparent",border:"1px solid rgba(255,255,255,0.12)",color:"rgba(255,255,255,0.4)",borderRadius:10,padding:"7px 16px",fontSize:12,cursor:"pointer",fontFamily:"inherit",marginBottom:20}}
        onMouseEnter={e=>e.currentTarget.style.color="#fff"} onMouseLeave={e=>e.currentTarget.style.color="rgba(255,255,255,0.4)"}>
        ← とびら一覧に戻る
      </button>

      <div style={{textAlign:"center",marginBottom:20}}>
        <div style={{fontSize:36,marginBottom:7}}>{door.emoji}</div>
        <h2 style={{fontFamily:"'Cinzel',serif",fontSize:"clamp(19px,5vw,30px)",fontWeight:700,background:`linear-gradient(135deg,#FFE566,${c.p})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text"}}>{door.label}</h2>
      </div>

      <div style={{background:"rgba(255,255,255,0.05)",borderRadius:100,height:4,marginBottom:22,overflow:"hidden"}}>
        <div style={{height:"100%",borderRadius:100,background:`linear-gradient(90deg,#6B2FFF,${c.p})`,width:`${(collected.length/total)*100}%`,transition:"width 0.7s cubic-bezier(0.34,1.56,0.64,1)",boxShadow:`0 0 10px ${c.g}`}}/>
      </div>

      <div className="hd-game-grid">
        {/* 扉ビジュアル */}
        <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
          <div id="hd-door" style={{width:"100%",maxWidth:180}}>
            <div style={{width:"100%",paddingTop:"140%",position:"relative"}}>
              <div style={{position:"absolute",inset:0,background:"linear-gradient(180deg,#232038,#171525)",borderRadius:"14px 14px 5px 5px",border:`1.5px solid ${c.p}40`,boxShadow:`inset 0 0 30px rgba(0,0,0,0.6),0 8px 40px rgba(0,0,0,0.8)`}}>
                <div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:"76%",height:"26%",background:`linear-gradient(180deg,${c.bg},rgba(35,32,56,0.8))`,borderRadius:"100px 100px 0 0",border:`1.5px solid ${c.p}50`,borderBottom:"none"}}>
                  <div style={{position:"absolute",top:"28%",left:"50%",transform:"translateX(-50%)",width:12,height:12,borderRadius:"50%",background:`radial-gradient(circle,${c.a},${c.p})`,boxShadow:`0 0 14px ${c.g}`}}/>
                </div>
                <div style={{position:"absolute",inset:10,display:"flex",overflow:"hidden",borderRadius:3}}>
                  <div style={{position:"absolute",inset:0,background:`radial-gradient(ellipse at 50% 30%,${c.p}80 0%,${c.p}30 40%,transparent 70%)`,opacity:doorOpen?1:0,transition:"opacity 1.4s ease",zIndex:2,pointerEvents:"none"}}/>
                  {["l","r"].map(side=>(
                    <div key={side} style={{flex:1,height:"100%",background:"linear-gradient(180deg,#3C2310,#5A3818 35%,#784E28 60%,#3C2310)",transformOrigin:side==="l"?"left center":"right center",borderRight:side==="l"?"1px solid rgba(100,60,20,0.45)":"none",borderLeft:side==="r"?"1px solid rgba(100,60,20,0.3)":"none",position:"relative",overflow:"hidden",transition:"transform 1.1s cubic-bezier(0.4,0,0.2,1)",transform:doorOpen?`perspective(900px) rotateY(${side==="l"?-82:82}deg)`:"perspective(900px) rotateY(0)"}}>
                      <div style={{position:"absolute",inset:0,background:"repeating-linear-gradient(90deg,transparent,transparent 3px,rgba(0,0,0,0.05) 3px,rgba(0,0,0,0.05) 4px)"}}/>
                      <div style={{position:"absolute",top:"9%",left:"10%",right:"10%",height:"27%",border:`1px solid ${c.p}28`,borderRadius:3,background:"rgba(0,0,0,0.14)"}}/>
                      <div style={{position:"absolute",top:"44%",left:"10%",right:"10%",height:"27%",border:`1px solid ${c.p}28`,borderRadius:3,background:"rgba(0,0,0,0.14)"}}/>
                      {side==="l"&&<div style={{position:"absolute",bottom:"19%",left:"50%",transform:"translateX(-50%)"}}>
                        <svg width="17" height="25" viewBox="0 0 17 25" fill="none">
                          <circle cx="8.5" cy="7.5" r="6.5" fill="rgba(0,0,0,0.78)" stroke={c.p+"cc"} strokeWidth="1.5"/>
                          <rect x="5" y="12.5" width="7" height="10.5" rx="2" fill="rgba(0,0,0,0.78)" stroke={c.p+"cc"} strokeWidth="1.5"/>
                          <circle cx="8.5" cy="7.5" r="2.5" fill="rgba(35,15,0,0.7)"/>
                        </svg>
                      </div>}
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
          <div style={{textAlign:"center",marginTop:8,fontSize:11,letterSpacing:"0.1em",color:doorOpen?c.p:"rgba(255,255,255,0.22)",transition:"color 0.6s"}}>
            {doorOpen?"✦ とびらが開いた！":phase==="collect"?"文字を集めよ":"文字を並べよう"}
          </div>
        </div>

        {/* 右パネル */}
        <div>
          {/* 文字収集 */}
          <div style={{background:"rgba(255,255,255,0.025)",border:`1px solid ${isCollectDone?c.p+"30":"rgba(255,255,255,0.07)"}`,borderRadius:20,padding:16,marginBottom:12,opacity:phase==="done"?0.5:1,transition:"all 0.5s"}}>
            <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:12}}>
              <div style={{width:24,height:24,borderRadius:"50%",background:isCollectDone?"rgba(80,200,120,0.8)":"rgba(107,47,255,0.9)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"#fff",flexShrink:0}}>{isCollectDone?"✓":"1"}</div>
              <span style={{fontSize:13,fontWeight:700,color:isCollectDone?"#86EFAC":"#D4AAFF"}}>文字を集める</span>
              <span style={{marginLeft:"auto",fontSize:11,color:"rgba(255,255,255,0.3)",background:"rgba(255,255,255,0.05)",padding:"2px 9px",borderRadius:100}}>{collected.length}/{total}</span>
            </div>
            <div style={{display:"flex",gap:6,justifyContent:"center",marginBottom:12,flexWrap:"wrap"}}>
              {Array.from({length:total}).map((_,i)=>{
                const fi=i<collected.length,isN=i===newCharIdx;
                return <div key={i} style={{width:42,height:46,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:700,transition:"all 0.4s",
                  ...(isN?{background:`linear-gradient(135deg,${c.bg},rgba(255,255,255,0.02))`,border:`2px solid ${c.p}`,color:c.p,animation:"hdCharPop 0.6s cubic-bezier(0.34,1.56,0.64,1) both"}
                  :fi?{background:`linear-gradient(135deg,${c.bg},rgba(255,255,255,0.02))`,border:`2px solid ${c.p}90`,color:c.a,boxShadow:`0 0 10px ${c.g}`,transform:"scale(1.04)"}
                  :{background:"rgba(255,255,255,0.03)",border:"2px dashed rgba(255,255,255,0.1)",color:"rgba(255,255,255,0.14)",fontSize:14})
                }}>{fi?collected[i]:"？"}</div>;
              })}
            </div>
            {!isCollectDone?(
              <>
                <div style={{display:"flex",gap:6,marginBottom:9}}>
                  {["free","theme"].map(m=>(
                    <button key={m} onClick={()=>setPostMode(m)} style={{flex:1,padding:8,fontSize:12,fontWeight:600,borderRadius:10,cursor:"pointer",fontFamily:"inherit",border:`1px solid ${postMode===m?c.p+"80":"rgba(255,255,255,0.08)"}`,background:postMode===m?c.bg:"rgba(255,255,255,0.03)",color:postMode===m?c.a:"rgba(255,255,255,0.3)"}}>
                      {m==="free"?"✏️ 自由投稿":"🎯 テーマ投稿"}
                    </button>
                  ))}
                </div>
                {postMode==="theme"&&<div style={{background:c.bg,border:`1px solid ${c.p}30`,borderRadius:10,padding:"9px 12px",marginBottom:8,fontSize:12,color:c.a,lineHeight:1.5}}><div style={{fontSize:10,color:"rgba(255,255,255,0.3)",marginBottom:2,letterSpacing:"0.1em"}}>テーマ</div>{currentTheme}</div>}
                <textarea rows={3} maxLength={200}
                  placeholder={postMode==="free"?"今日の学びや気づきを投稿しよう！":`テーマ: ${currentTheme}`}
                  value={postText} onChange={e=>setPostText(e.target.value)} disabled={isPosting}
                  style={{width:"100%",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:12,color:"#E8E0FF",fontFamily:"'Noto Sans JP',sans-serif",fontSize:13,padding:"11px 13px",resize:"none",outline:"none",lineHeight:1.6}}/>
                <div style={{textAlign:"right",fontSize:11,color:"rgba(255,255,255,0.22)",margin:"3px 0 8px"}}>{postText.length}/200</div>
                <button onClick={handlePost} style={postBtnStyle}>
                  {isPosting?"投稿中...":`📝 投稿して文字をゲット（残り ${total-collected.length} 回）`}
                </button>
              </>
            ):<div style={{textAlign:"center",fontSize:13,color:"#86EFAC",padding:"5px 0"}}>✓ 全文字コンプリート！下の枠に並べてとびらを開けよう</div>}
            {postLog.length>0&&<div style={{marginTop:8,maxHeight:58,overflowY:"auto"}}>{postLog.map(l=><div key={l.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:11,color:"rgba(255,255,255,0.3)",padding:"3px 0",borderBottom:"1px solid rgba(255,255,255,0.04)",gap:8}}><span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>#{l.id} {l.text}</span><span style={{color:c.a,fontWeight:700,fontSize:13}}>「{l.char}」</span><span style={{flexShrink:0}}>{l.time}</span></div>)}</div>}
          </div>

          {/* パスワード組み立て */}
          <div style={{background:isCollectDone?c.bg:"rgba(255,255,255,0.025)",border:`1px solid ${isCollectDone?c.p+"40":"rgba(255,255,255,0.07)"}`,borderRadius:20,padding:16,opacity:isCollectDone?1:0.3,pointerEvents:isCollectDone?"auto":"none",transition:"all 0.5s",boxShadow:isCollectDone?`0 0 26px ${c.g}`:"none"}}>
            <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:14}}>
              <div style={{width:24,height:24,borderRadius:"50%",background:phase==="done"?"rgba(80,200,120,0.8)":isCollectDone?`${c.p}dd`:"rgba(40,30,70,0.9)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:isCollectDone?"#fff":"#3A2A6A",flexShrink:0}}>{phase==="done"?"✓":"2"}</div>
              <span style={{fontSize:13,fontWeight:700,color:isCollectDone?c.a:"rgba(255,255,255,0.2)"}}>パスワードを作ってとびらを開ける</span>
            </div>
            <PasswordBuilder collected={collected} slots={slots} onDrop={handleDrop} onRemove={handleRemove} color={c} active={phase==="arrange"}/>
            {errorMsg&&<div style={{background:"rgba(255,50,50,0.08)",border:"1px solid rgba(255,50,50,0.22)",borderRadius:10,padding:"9px 12px",fontSize:12,color:"#FF9090",textAlign:"center",marginTop:12}}>{errorMsg}</div>}
            <button onClick={handleUnlock} disabled={!pwFull||phase!=="arrange"}
              style={{width:"100%",padding:13,border:"none",borderRadius:13,fontSize:14,fontWeight:700,fontFamily:"inherit",letterSpacing:"0.04em",transition:"all 0.3s",marginTop:14,background:pwFull&&phase==="arrange"?`linear-gradient(135deg,${c.p},${c.a})`:"rgba(255,255,255,0.06)",color:pwFull&&phase==="arrange"?"#fff":"rgba(255,255,255,0.3)",cursor:pwFull&&phase==="arrange"?"pointer":"default",boxShadow:pwFull&&phase==="arrange"?`0 4px 22px ${c.g}`:"none",animation:pwFull&&phase==="arrange"?"hdGlow 2s ease-in-out infinite":"none"}}>
              🔑 とびらを開ける
            </button>
          </div>
        </div>
      </div>

      {phase==="collect"&&<div style={{background:"rgba(107,47,255,0.05)",border:"1px solid rgba(107,47,255,0.12)",borderRadius:14,padding:"12px 16px",fontSize:12,color:"#7B6AAA",lineHeight:1.7,marginTop:14}}><span style={{color:"#9B6DFF",fontWeight:500}}>💡 ヒント</span>　投稿を{total}回して文字が揃ったら、ドラッグ（PC）またはスワイプ（スマホ）でパスワード欄に並べてとびらを開けよう！</div>}
      {showReward&&<RewardModal door={door} onClose={()=>{setShowReward(false);onBack();}}/>}
    </>
  );
}

// ── ルート ──
function HimitsunoDoor({ uid }) {
  const [clearedIds, setClearedIds] = useState([]);
  const [loading, setLoading] = useState(true);
  const [currentDoor, setCurrentDoor] = useState(null);

  useEffect(() => {
    const init = () => loadCleared(uid).then(c => { setClearedIds(c); setLoading(false); });
    if (window._sdFirebaseReady) {
      init();
    } else {
      window.addEventListener('sdFirebaseReady', init, { once: true });
    }
  }, [uid]);

  const handleClear = async (doorId) => {
    const door = DOORS.find(d => d.id === doorId);
    const newCleared = clearedIds.includes(doorId) ? clearedIds : [...clearedIds, doorId];
    setClearedIds(newCleared);
    await saveCleared(uid, newCleared);
    await saveReward(uid, door);
  };

  if (loading) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",color:"rgba(255,255,255,0.4)",fontFamily:"'Noto Sans JP',sans-serif"}}>
      読み込み中...
    </div>
  );

  return (
    <>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Cinzel:wght@600;700&display=swap');
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        @keyframes hdShimmer{0%{background-position:200% center}100%{background-position:-200% center}}
        @keyframes hdCharPop{0%{opacity:0;transform:scale(0.2) rotate(-15deg)}65%{transform:scale(1.25) rotate(3deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
        @keyframes hdGlow{0%,100%{filter:brightness(1)}50%{filter:brightness(1.18)}}
        @keyframes hdShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
        @keyframes hdPfly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)}}
        @keyframes hdRpop{0%{opacity:0;transform:scale(0.5) translateY(20px)}65%{transform:scale(1.06)}100%{opacity:1;transform:scale(1) translateY(0)}}
        @keyframes hdRspin{0%{transform:rotate(-15deg) scale(0.4);opacity:0}60%{transform:rotate(8deg) scale(1.15);opacity:1}100%{transform:rotate(0) scale(1)}}
        @keyframes hdSup{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        @keyframes hdOrb{0%,100%{transform:translate(0,0)}33%{transform:translate(25px,-15px)}66%{transform:translate(-15px,12px)}}
        .hd-root{min-height:100vh;background:#070511;font-family:'Noto Sans JP',sans-serif;color:#fff;position:relative;overflow-x:hidden;padding-bottom:80px;-webkit-tap-highlight-color:transparent}
        .hd-orb{position:absolute;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0}
        .hd-inner{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:0 16px}
        .hd-game-grid{display:grid;grid-template-columns:clamp(140px,26%,180px) 1fr;gap:18px;align-items:start}
        @media(max-width:520px){.hd-game-grid{grid-template-columns:1fr!important}}
      `}</style>
      <div className="hd-root">
        <div className="hd-orb" style={{width:500,height:500,background:"rgba(107,47,255,0.11)",top:-200,left:-120,animation:"hdOrb 14s ease-in-out infinite"}}/>
        <div className="hd-orb" style={{width:360,height:360,background:currentDoor?currentDoor.col.g:"rgba(255,100,150,0.07)",top:"45%",right:-130,animation:"hdOrb 18s ease-in-out 5s infinite reverse",transition:"background 0.8s"}}/>
        <div className="hd-orb" style={{width:260,height:260,background:"rgba(255,215,0,0.055)",bottom:40,left:"28%",animation:"hdOrb 11s ease-in-out 8s infinite"}}/>

        {/* 戻るボタン（一覧画面） */}
        {!currentDoor && (
          <div style={{position:"sticky",top:0,zIndex:10,padding:"12px 16px",display:"flex",justifyContent:"flex-start"}}>
            <button
              onClick={() => window.parent.postMessage({type:'SECRET_DOOR_BACK'}, '*')}
              style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",color:"rgba(255,255,255,0.5)",borderRadius:10,padding:"7px 16px",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}
              onMouseEnter={e=>e.currentTarget.style.color="#fff"} onMouseLeave={e=>e.currentTarget.style.color="rgba(255,255,255,0.5)"}
            >← Emuに戻る</button>
          </div>
        )}

        <div className="hd-inner">
          <div style={{textAlign:"center",padding:"24px 0 20px"}}>
            <div style={{display:"inline-flex",alignItems:"center",gap:6,background:"rgba(255,215,0,0.07)",border:"1px solid rgba(255,215,0,0.18)",borderRadius:100,padding:"5px 18px",fontSize:10,color:"#FFD700",letterSpacing:"0.2em",marginBottom:14,fontFamily:"'Cinzel',serif"}}>✦ SECRET DOOR ✦</div>
            <h1 style={{fontFamily:"'Cinzel',serif",fontSize:"clamp(24px,7vw,46px)",fontWeight:700,letterSpacing:"0.05em",background:"linear-gradient(135deg,#FFE566 0%,#FFB800 28%,#FF8C42 58%,#FF6B9D 100%)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text",backgroundSize:"200%",animation:"hdShimmer 5s linear infinite"}}>秘密のとびら</h1>
            <p style={{color:"rgba(196,168,255,0.6)",fontSize:12,marginTop:8,letterSpacing:"0.06em"}}>投稿して文字を集め、5つのとびらの謎を解き明かせ</p>
            <div style={{display:"flex",justifyContent:"center",gap:8,marginTop:14,flexWrap:"wrap"}}>
              {DOORS.map(d=>{const cl=clearedIds.includes(d.id);return<div key={d.id} title={d.label} style={{width:34,height:34,borderRadius:"50%",background:cl?`radial-gradient(circle,${d.col.p},${d.col.a}50)`:"rgba(255,255,255,0.06)",border:`1.5px solid ${cl?d.col.p:"rgba(255,255,255,0.1)"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,transition:"all 0.5s",boxShadow:cl?`0 0 12px ${d.col.g}`:"none"}}>{cl?d.emoji:"🔒"}</div>;})}
            </div>
            {clearedIds.length===5&&<div style={{marginTop:14,background:"linear-gradient(135deg,rgba(255,215,0,0.1),rgba(255,165,0,0.06))",border:"1px solid rgba(255,215,0,0.28)",borderRadius:16,padding:14}}><div style={{fontSize:24,marginBottom:4}}>🎉</div><div style={{color:"#FFD700",fontWeight:700,fontSize:15}}>全とびらクリア達成！</div></div>}
          </div>

          {!currentDoor&&(
            <>
              <p style={{textAlign:"center",fontSize:13,color:"rgba(196,168,255,0.55)",marginBottom:20}}>挑戦するとびらを選べ — {clearedIds.length}/5 クリア済み</p>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:12}}>
                {DOORS.map(d=>{const cl=clearedIds.includes(d.id);return(
                  <button key={d.id} onClick={()=>!cl&&setCurrentDoor(d)}
                    style={{background:cl?`linear-gradient(135deg,${d.col.bg},rgba(255,255,255,0.02))`:"rgba(255,255,255,0.03)",border:`1.5px solid ${cl?d.col.p+"55":"rgba(255,255,255,0.08)"}`,borderRadius:18,padding:"20px 14px",cursor:cl?"default":"pointer",textAlign:"center",fontFamily:"inherit",position:"relative",overflow:"hidden",width:"100%",transition:"all 0.3s",opacity:cl?0.75:1}}
                    onMouseEnter={e=>{if(!cl){e.currentTarget.style.transform="translateY(-3px) scale(1.02)";e.currentTarget.style.boxShadow=`0 8px 28px ${d.col.g}`;}}}
                    onMouseLeave={e=>{e.currentTarget.style.transform="";e.currentTarget.style.boxShadow="";}}>
                    {cl&&<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.38)",borderRadius:17,display:"flex",alignItems:"center",justifyContent:"center",zIndex:2}}><span style={{background:`linear-gradient(135deg,${d.col.p},${d.col.a})`,borderRadius:100,padding:"7px 16px",fontSize:12,fontWeight:700,color:"#fff"}}>✓ クリア済み</span></div>}
                    <div style={{fontSize:38,marginBottom:9}}>{d.emoji}</div>
                    <div style={{fontSize:13,fontWeight:700,color:cl?d.col.a:"#C4A8FF",marginBottom:4}}>{d.label}</div>
                    <div style={{fontSize:11,color:"rgba(255,255,255,0.28)",marginBottom:7}}>{d.answer.length}文字</div>
                    <div style={{fontSize:10,color:cl?d.col.a:"rgba(255,255,255,0.22)",background:cl?d.col.bg:"rgba(255,255,255,0.04)",borderRadius:100,padding:"3px 10px",display:"inline-block",border:`1px solid ${cl?d.col.p+"35":"transparent"}`}}>{cl?"クリア済み ✦":"挑戦する →"}</div>
                  </button>
                );})}
              </div>
            </>
          )}
          {currentDoor&&<DoorGame door={currentDoor} onClear={handleClear} onBack={()=>setCurrentDoor(null)}/>}
        </div>
      </div>
    </>
  );
}

// ── App Entry ──
function App() {
  const [uid, setUid] = useState(() => {
    return localStorage.getItem('emu_secret_door_uid') || 'guest';
  });

  useEffect(() => {
    // 親からUID受信
    const handler = (e) => {
      if (e.data?.type === 'SET_USER_ID' && e.data?.uid) {
        setUid(e.data.uid);
        localStorage.setItem('emu_secret_door_uid', e.data.uid);
      }
    };
    window.addEventListener('message', handler);
    // 親にUID要求
    if (window.parent && window.parent !== window) {
      window.parent.postMessage({ type: 'SECRET_DOOR_REQUEST_UID' }, '*');
    }
    return () => window.removeEventListener('message', handler);
  }, []);

  return <HimitsunoDoor uid={uid} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
