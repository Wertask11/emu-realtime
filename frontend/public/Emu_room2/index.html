<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Emu Room2 - Constellation</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
<!-- Room2 モード選択UI -->
<div id="room2ModeSelect" style="
  position:fixed;inset:0;background:rgba(3,5,15,0.95);
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:24px;z-index:9999;
  font-family:'Noto Sans JP',sans-serif;
">
  <div style="font-family:'Cinzel',serif;font-size:24px;color:#4a9eff;letter-spacing:0.2em;">Room 2</div>
  <div style="font-size:13px;color:#64748b;">探索・遊び</div>
  <div style="display:flex;gap:20px;margin-top:16px;">
    <button onclick="openStarMode()" style="
      width:160px;height:160px;background:rgba(74,158,255,0.08);
      border:1px solid rgba(74,158,255,0.3);border-radius:16px;
      color:#e2e8f0;cursor:pointer;font-size:13px;
      font-family:'Noto Sans JP',sans-serif;transition:all 0.2s;
      display:flex;flex-direction:column;align-items:center;
      justify-content:center;gap:12px;
    ">
      <div style="font-size:48px;">🌟</div>
      <div>星空を見る</div>
    </button>
    <button onclick="openEchoField()" style="
      width:160px;height:160px;background:rgba(168,85,247,0.08);
      border:1px solid rgba(168,85,247,0.3);border-radius:16px;
      color:#e2e8f0;cursor:pointer;font-size:13px;
      font-family:'Noto Sans JP',sans-serif;transition:all 0.2s;
      display:flex;flex-direction:column;align-items:center;
      justify-content:center;gap:12px;
    ">
      <div style="font-size:48px;">♟️</div>
      <div>ECHO FIELD</div>
    </button>
  </div>
</div>

<!-- ECHO FIELD iframe -->
<iframe id="echoFieldFrame" src=""
  style="display:none;position:fixed;inset:0;width:100%;height:100%;border:none;z-index:9998;">
</iframe>

  <!-- 星座キャンバス -->
  <canvas id="constellationCanvas"></canvas>
  <div id="starField"></div>

  <!-- 星情報UI -->
  <div id="starInfo" class="star-info">
    星一覧
  </div>

  <!-- ユーザー名表示 -->
<div id="userNameDisplay" class="user-name">
  未設定
</div>

<div id="birthHint" class="birth-hint">
  ✨ 星が生まれそう…
</div>


  <!-- 詳細ボタン -->
  <button id="detailBtn">星座の見方</button>

  <!-- 詳細モーダル -->
  <div id="detailOverlay">
    <div id="detailModal">
      <h2>🌌 星座の見方</h2>

      <h3>⭐ 星の意味（行動）</h3>
      <ul>
        <li><span class="legend star post"></span> 投稿：小さな白い星</li>
        <li><span class="legend star nft"></span> NFT購入：大きな青い星</li>
        <li><span class="legend star good"></span> Goodが多い：より明るく輝く</li>
        <li><span class="legend star change"></span> Change：赤く変化する</li>
        <li><span class="legend star room1"></span> room1：黄色に変化する</li>
      </ul>

      <h3>🔗 線の意味（関係）</h3>
      <ul>
        <li><span class="legend line project"></span> 同一プロジェクト：実線</li>
        <li><span class="legend line timeline"></span> 時系列：点線</li>
        <li><span class="legend line collab"></span> 共創：太線</li>
      </ul>

      <p class="hint">
        星はあなたの「行動」、<br>
        線は行動同士の「意味のつながり」を表しています。
      </p>

      <button id="closeDetail">閉じる</button>
    </div>
  </div>

  <!-- JSは必ず最後 -->
  <script src="/actionhub.js"></script>
  <script src="room2.js"></script>

</body>
</html>
